# 屠戮OpenClaw 全平台发布构建
# 推送 v* 标签时自动构建跨平台产物并创建 GitHub Release
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "发布版本号 (例如: v1.0.0)"
        required: true
        type: string
        default: "v1.0.0"

env:
  TAG_NAME: ${{ github.event.inputs.tag_name || github.ref_name }}

jobs:
  build-windows-x64:
    name: Build (Windows x64)
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Build Tauri
        run: npm run tauri build

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: TuLuOpenClaw-${{ env.TAG_NAME }}-Windows-x64-msi
          path: src-tauri/target/release/bundle/msi/*.msi

      - name: Upload NSIS .exe
        uses: actions/upload-artifact@v4
        with:
          name: TuLuOpenClaw-${{ env.TAG_NAME }}-Windows-x64-setup
          path: src-tauri/target/release/bundle/nsis/*.exe

  build-windows-arm64:
    name: Build (Windows ARM64)
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Build Tauri (ARM64)
        run: npm run tauri build --target aarch64-pc-windows-msvc

      - name: Upload MSI (ARM64)
        uses: actions/upload-artifact@v4
        with:
          name: TuLuOpenClaw-${{ env.TAG_NAME }}-Windows-ARM64-msi
          path: src-tauri/target/aarch64-pc-windows-msvc/release/bundle/msi/*.msi

      - name: Upload NSIS .exe (ARM64)
        uses: actions/upload-artifact@v4
        with:
          name: TuLuOpenClaw-${{ env.TAG_NAME }}-Windows-ARM64-setup
          path: src-tauri/target/aarch64-pc-windows-msvc/release/bundle/nsis/*.exe

  build-macos-arm64:
    name: Build (macOS ARM64)
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Disable code signing
        run: echo "CODE_SIGN_IDENTITY=-" >> $GITHUB_ENV

      - name: Build Tauri
        run: npm run tauri build --target aarch64-apple-darwin

      - name: Upload .app
        uses: actions/upload-artifact@v4
        with:
          name: TuLuOpenClaw-${{ env.TAG_NAME }}-macOS-ARM64-app
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.app

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: TuLuOpenClaw-${{ env.TAG_NAME }}-macOS-ARM64-dmg
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg

  build-macos-x64:
    name: Build (macOS x64)
    runs-on: macos-13
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Disable code signing
        run: echo "CODE_SIGN_IDENTITY=-" >> $GITHUB_ENV

      - name: Build Tauri
        run: npm run tauri build --target x86_64-apple-darwin

      - name: Upload .app
        uses: actions/upload-artifact@v4
        with:
          name: TuLuOpenClaw-${{ env.TAG_NAME }}-macOS-x64-app
          path: src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.app

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: TuLuOpenClaw-${{ env.TAG_NAME }}-macOS-x64-dmg
          path: src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg

  build-linux:
    name: Build (Linux x64)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            cmake \
            clang

      - name: Build Tauri
        run: npm run tauri build

      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: TuLuOpenClaw-${{ env.TAG_NAME }}-Linux-x64-deb
          path: src-tauri/target/release/bundle/deb/*.deb

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: TuLuOpenClaw-${{ env.TAG_NAME }}-Linux-x64-appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage

  release:
    name: Create Release
    needs: [build-windows-x64, build-windows-arm64, build-macos-arm64, build-macos-x64, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: List artifacts
        run: find artifacts -type f | head -40

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: TuLuOpenClaw ${{ env.TAG_NAME }}
          draft: false
          prerelease: false
          files: artifacts/**/*
