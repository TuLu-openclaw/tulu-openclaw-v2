# 屠戮OpenClaw 发布构建工作流
# 推送 v* 标签时自动构建跨平台产物并创建 GitHub Release
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "发布版本号 (例如: v1.0.0)"
        required: true
        type: string
        default: "v1.0.0"

env:
  TAG_NAME: ${{ github.event.inputs.tag_name || github.ref_name }}

jobs:
  build:
    name: Build (${{ matrix.platform.name }})
    runs-on: ${{ matrix.platform.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macOS (ARM64)
            os: macos-latest
            rust_target: aarch64-apple-darwin
          - name: macOS (Intel)
            os: macos-latest
            rust_target: x86_64-apple-darwin
          - name: Linux (x64)
            os: ubuntu-latest
            rust_target: ""
          - name: Windows (x64)
            os: windows-latest
            rust_target: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: |
          npm cache clean --force
          npm ci --prefer-offline

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.rust_target }}

      - name: Rust compile cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.platform.name }}

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Install MinGW
        if: runner.os == 'Windows'
        run: choco install mingw -y

      - name: Build Tauri app
        shell: bash
        run: |
          if [ "${{ runner.os }}" == "Windows" ]; then
            npm run tauri build
          elif [ -n "${{ matrix.platform.rust_target }}" ]; then
            npm run tauri build -- --target ${{ matrix.platform.rust_target }}
          else
            npm run tauri build
          fi

      - name: Upload MSI installer (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: TuLuOpenClaw-${{ env.TAG_NAME }}-Windows-x64-msi
          path: src-tauri/target/release/bundle/msi/*.msi

      - name: Upload DMG installer (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: TuLuOpenClaw-${{ env.TAG_NAME }}-${{ matrix.platform.name }}-dmg
          path: src-tauri/target/${{ matrix.platform.rust_target }}/release/bundle/dmg/*.dmg

      - name: Upload DEB/APPIMAGE (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: TuLuOpenClaw-${{ env.TAG_NAME }}-Linux-x64-deb
          path: src-tauri/target/release/bundle/deb/*.deb

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: TuLuOpenClaw ${{ env.TAG_NAME }}
          draft: false
          prerelease: false
          files: artifacts/**/*.msi artifacts/**/*.dmg artifacts/**/*.deb
