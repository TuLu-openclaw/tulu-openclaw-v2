# 屠戮OpenClaw 发布构建工作流
# 推送 v* 标签时自动构建跨平台产物并创建 GitHub Release
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "发布版本号 (例如: v1.0.0)"
        required: true
        type: string
        default: "v1.0.0"

env:
  TAG_NAME: ${{ github.event.inputs.tag_name || github.ref_name }}

jobs:
  build:
    name: Build (${{ matrix.platform.name }})
    runs-on: ${{ matrix.platform.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macOS (ARM64)
            os: macos-latest
            rust_target: aarch64-apple-darwin
            artifact_suffix: "macOS-ARM64"
            bundle_path: "src-tauri/target/aarch64-apple-darwin/release/bundle/dmg"
          - name: macOS (Intel)
            os: macos-latest
            rust_target: x86_64-apple-darwin
            artifact_suffix: "macOS-Intel"
            bundle_path: "src-tauri/target/x86_64-apple-darwin/release/bundle/dmg"
          - name: Linux (x64)
            os: ubuntu-latest
            rust_target: ""
            artifact_suffix: "Linux-x64"
            bundle_path: "src-tauri/target/release/bundle"
          - name: Windows (x64)
            os: windows-latest
            rust_target: ""
            artifact_suffix: "Windows-x64"
            bundle_path: "src-tauri/target/release/bundle"
          - name: Windows (ARM64)
            os: windows-latest
            rust_target: aarch64-pc-windows-msvc
            artifact_suffix: "Windows-ARM64"
            bundle_path: "src-tauri/target/aarch64-pc-windows-msvc/release/bundle"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install frontend dependencies
        run: |
          npm cache clean --force
          npm ci --prefer-offline

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.rust_target }}

      - name: Rust compile cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.platform.name }}

      - name: Disable code signing (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "CODE_SIGN_IDENTITY=-" >> $GITHUB_ENV

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            cmake \
            clang

      - name: Build Tauri app (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install mingw -y --no-progress --ignore-checksums
          npm run tauri build -- --target ${{ matrix.platform.rust_target }}
        shell: powershell

      - name: Build Tauri app (macOS/Linux)
        if: runner.os != 'Windows'
        run: |
          if [ -n "${{ matrix.platform.rust_target }}" ]; then
            npm run tauri build -- --target ${{ matrix.platform.rust_target }}
          else
            npm run tauri build
          fi
        shell: bash

      # ── DMG (macOS) ─────────────────────────────────────
      - name: Upload DMG (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: TuLuOpenClaw-${{ env.TAG_NAME }}-${{ matrix.platform.artifact_suffix }}-dmg
          path: ${{ matrix.platform.bundle_path }}/*.dmg

      # ── MSI (Windows / macOS) ────────────────────────────
      - name: Upload MSI (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: TuLuOpenClaw-${{ env.TAG_NAME }}-${{ matrix.platform.artifact_suffix }}-msi
          path: ${{ matrix.platform.bundle_path }}/msi/*.msi

      # ── NSIS .exe (Windows) ────────────────────────────────
      - name: Upload NSIS installer (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: TuLuOpenClaw-${{ env.TAG_NAME }}-${{ matrix.platform.artifact_suffix }}-setup
          path: ${{ matrix.platform.bundle_path }}/nsis/*.exe

      # ── DEB (Linux) ──────────────────────────────────────
      - name: Upload DEB (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: TuLuOpenClaw-${{ env.TAG_NAME }}-${{ matrix.platform.artifact_suffix }}-deb
          path: ${{ matrix.platform.bundle_path }}/deb/*.deb

      # ── AppImage (Linux) ─────────────────────────────────
      - name: Upload AppImage (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: TuLuOpenClaw-${{ env.TAG_NAME }}-${{ matrix.platform.artifact_suffix }}-appimage
          path: ${{ matrix.platform.bundle_path }}/appimage/*.AppImage

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: List artifacts
        run: find artifacts -type f | head -40

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: TuLuOpenClaw ${{ env.TAG_NAME }}
          draft: false
          prerelease: false
          files: artifacts/**/*
