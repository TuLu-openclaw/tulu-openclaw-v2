            echo "| DEB锛圖ebian/Ubuntu锛?| [灞犳埉OpenClaw_${VERSION}_amd64.deb](${DL}/灞犳埉OpenClaw_${VERSION}_amd64.deb) |"
            echo "| RPM锛團edora/RHEL锛?| [灞犳埉OpenClaw-${VERSION}-1.x86_64.rpm](${DL}/灞犳埉OpenClaw-${VERSION}-1.x86_64.rpm) |"
            echo ""
            echo "---"
