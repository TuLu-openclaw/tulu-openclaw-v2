# 屠戮OpenClaw 发布构建工作流
# 推送 v* 标签时自动构建跨平台产物并创建 GitHub Release
name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "发布版本号 (例如: v1.0.0)"
        required: true
        type: string
        default: "v1.0.0"

env:
  TAG_NAME: ${{ github.event.inputs.tag_name || github.ref_name }}
  IS_RELEASE: ${{ startsWith(github.ref, 'refs/tags/v') && !startsWith(github.ref_name, 'refs/') || startsWith(github.ref_name, 'v') }}

jobs:
  # ── Windows x64（独立 job，release 只依赖它）───────────────
  build-windows-x64:
    name: Build (Windows x64)
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install frontend dependencies
        run: |
          npm cache clean --force
          npm ci --prefer-offline

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust compile cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: Windows-x64

      - name: Build Tauri app
        run: |
          choco install mingw -y --no-progress --ignore-checksums
          npm run tauri build
        shell: powershell

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: TuLuOpenClaw-${{ env.TAG_NAME }}-Windows-x64-setup
          path: src-tauri/target/release/bundle/nsis/*.exe

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: TuLuOpenClaw-${{ env.TAG_NAME }}-Windows-x64-msi
          path: src-tauri/target/release/bundle/msi/*.msi

  # ── 其他平台（可选，失败不影响发版）──────────────────────
  build-others:
    name: Build (${{ matrix.platform.name }})
    runs-on: ${{ matrix.platform.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macOS (ARM64)
            os: macos-latest
            rust_target: aarch64-apple-darwin
            artifact_suffix: "macOS-ARM64"
            bundle_path: "src-tauri/target/aarch64-apple-darwin/release/bundle/dmg"
          - name: macOS (Intel)
            os: macos-latest
            rust_target: x86_64-apple-darwin
            artifact_suffix: "macOS-Intel"
            bundle_path: "src-tauri/target/x86_64-apple-darwin/release/bundle/dmg"
          - name: Linux (x64)
            os: ubuntu-latest
            rust_target: ""
            artifact_suffix: "Linux-x64"
            bundle_path: "src-tauri/target/release/bundle"
          - name: Windows (ARM64)
            os: windows-latest
            rust_target: aarch64-pc-windows-msvc
            artifact_suffix: "Windows-ARM64"
            bundle_path: "src-tauri/target/aarch64-pc-windows-msvc/release/bundle"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install frontend dependencies
        run: |
          npm cache clean --force
          npm ci --prefer-offline

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.rust_target }}

      - name: Rust compile cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.platform.name }}

      - name: Disable code signing (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "CODE_SIGN_IDENTITY=-" >> $GITHUB_ENV

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            cmake \
            clang

      - name: Build Tauri app (Windows)
        if: runner.os == 'Windows'
        env:
          CARGO_BUILD_JOBS: 2
          RUSTFLAGS: "-C codegen-units=1"
        run: |
          choco install mingw -y --no-progress --ignore-checksums
          $t = "${{ matrix.platform.rust_target }}"
          if ($t -ne "") { npm run tauri build -- --target $t } else { npm run tauri build }
        shell: powershell

      - name: Build Tauri app (macOS/Linux)
        if: runner.os != 'Windows'
        env:
          CARGO_BUILD_JOBS: 2
          RUSTFLAGS: "-C codegen-units=1"
        run: |
          if [ -n "${{ matrix.platform.rust_target }}" ]; then
            npm run tauri build -- --target ${{ matrix.platform.rust_target }}
          else
            npm run tauri build
          fi
        shell: bash

      - name: Upload DMG (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: TuLuOpenClaw-${{ env.TAG_NAME }}-${{ matrix.platform.artifact_suffix }}-dmg
          path: ${{ matrix.platform.bundle_path }}/*.dmg

      - name: Upload AppImage (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: TuLuOpenClaw-${{ env.TAG_NAME }}-${{ matrix.platform.artifact_suffix }}-appimage
          path: ${{ matrix.platform.bundle_path }}/appimage/*.AppImage

  # ── 发版（只等 Windows x64）─────────────────────────────
  release:
    name: Create Release
    needs: [build-windows-x64]
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.tag_name != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows x64 setup
        uses: actions/download-artifact@v4
        with:
          name: TuLuOpenClaw-${{ env.TAG_NAME }}-Windows-x64-setup
          path: artifacts

      - name: Download Windows x64 MSI
        uses: actions/download-artifact@v4
        with:
          name: TuLuOpenClaw-${{ env.TAG_NAME }}-Windows-x64-msi
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | head -20

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: TuLuOpenClaw ${{ env.TAG_NAME }}
          draft: false
          prerelease: false
          files: artifacts/**/*
