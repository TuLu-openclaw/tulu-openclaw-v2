# XingShuOpenClaw Release Build Workflow
# Builds all platforms automatically when pushing to main branch
# Creates GitHub Release when pushing a v* tag
name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release version (e.g.: v1.0.0)"
        required: false
        type: string
        default: ""

env:
  TAG_NAME: ${{ github.event.inputs.tag_name || github.ref_name }}

jobs:
  # ─────────── Windows x64 ────────────────────────────────────────
  build-windows-x64:
    name: Build (Windows x64)
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install frontend dependencies
        run: npm ci --prefer-offline

      - name: Setup Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Rust compile cache
        continue-on-error: true
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: Windows-x64

      - name: Prepare bundled runtime
        env:
          RUNTIME_BASE_URL: http://124.220.22.11:9002/runtime
        run: node scripts/prepare-runtime.mjs windows-x64

      - name: Verify bundled runtime
        shell: bash
        run: |
          if ! test -f _vendor/runtime/windows-x64/node/node.exe || ! test -f _vendor/runtime/windows-x64/git/cmd/git.exe; then
            find _vendor/runtime/windows-x64 -maxdepth 4 -print || true
            exit 1
          fi

      - name: Build Tauri app
        run: |
          choco install mingw -y --no-progress --ignore-checksums
          npm run build
          npm run tauri build
        shell: powershell

      - name: Normalize artifact tag
        shell: bash
        run: |
          SAFE_TAG_NAME="${TAG_NAME//\//-}"
          echo "SAFE_TAG_NAME=$SAFE_TAG_NAME" >> "$GITHUB_ENV"

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: XingShuOpenClaw-${{ env.SAFE_TAG_NAME }}-Windows-x64-setup
          path: src-tauri/target/release/bundle/nsis/*.exe


  # ─────────── Windows ARM64 ───────────────────────────────────────
  build-windows-arm64:
    name: Build (Windows ARM64)
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install frontend dependencies
        run: npm ci --prefer-offline

      - name: Setup Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --target aarch64-pc-windows-msvc
          rustup default stable

      - name: Rust compile cache
        continue-on-error: true
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: Windows-ARM64

      - name: Prepare bundled runtime
        env:
          RUNTIME_BASE_URL: http://124.220.22.11:9002/runtime
        run: node scripts/prepare-runtime.mjs windows-arm64

      - name: Verify bundled runtime
        shell: bash
        run: |
          if ! test -f _vendor/runtime/windows-arm64/node/node.exe || ! test -f _vendor/runtime/windows-arm64/git/cmd/git.exe; then
            find _vendor/runtime/windows-arm64 -maxdepth 4 -print || true
            exit 1
          fi

      - name: Build Tauri app (ARM64)
        env:
          CARGO_BUILD_JOBS: 2
          RUSTFLAGS: "-C codegen-units=1"
        run: |
          choco install mingw -y --no-progress --ignore-checksums
          npm run build
          npm run tauri build -- --target aarch64-pc-windows-msvc
        shell: powershell

      - name: Normalize artifact tag
        shell: bash
        run: |
          SAFE_TAG_NAME="${TAG_NAME//\//-}"
          echo "SAFE_TAG_NAME=$SAFE_TAG_NAME" >> "$GITHUB_ENV"

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: XingShuOpenClaw-${{ env.SAFE_TAG_NAME }}-Windows-ARM64-setup
          path: src-tauri/target/aarch64-pc-windows-msvc/release/bundle/nsis/*.exe


  # ─────────── macOS ARM64 ────────────────────────────────────────
  build-macos-arm64:
    name: Build (macOS ARM64)
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install frontend dependencies
        run: npm ci --prefer-offline

      - name: Setup Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --target aarch64-apple-darwin
          rustup default stable

      - name: Rust compile cache
        continue-on-error: true
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: macOS-ARM64

      - name: Disable code signing
        run: echo "CODE_SIGN_IDENTITY=-" >> $GITHUB_ENV

      - name: Prepare bundled runtime
        env:
          RUNTIME_BASE_URL: http://124.220.22.11:9002/runtime
        run: node scripts/prepare-runtime.mjs macos-arm64

      - name: Verify bundled runtime
        run: |
          if ! test -f _vendor/runtime/macos-arm64/node/bin/node; then
            find _vendor/runtime/macos-arm64 -maxdepth 4 -print || true
            exit 1
          fi

      - name: Build Tauri app
        env:
          CARGO_BUILD_JOBS: 2
          RUSTFLAGS: "-C codegen-units=1"
        run: |
          npm run build
          npm run tauri build -- --target aarch64-apple-darwin

      - name: Find DMG
        id: find_dmg
        run: find src-tauri/target/aarch64-apple-darwin/release/bundle -name "*.dmg" -type f

      - name: Normalize artifact tag
        shell: bash
        run: |
          SAFE_TAG_NAME="${TAG_NAME//\//-}"
          echo "SAFE_TAG_NAME=$SAFE_TAG_NAME" >> "$GITHUB_ENV"

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: XingShuOpenClaw-${{ env.SAFE_TAG_NAME }}-macOS-ARM64-dmg
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/**/*.dmg

  # ─────────── macOS Intel ────────────────────────────────────────
  build-macos-intel:
    name: Build (macOS Intel)
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install frontend dependencies
        run: npm ci --prefer-offline

      - name: Setup Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --target x86_64-apple-darwin
          rustup default stable

      - name: Rust compile cache
        continue-on-error: true
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: macOS-Intel

      - name: Disable code signing
        run: echo "CODE_SIGN_IDENTITY=-" >> $GITHUB_ENV

      - name: Prepare bundled runtime
        env:
          RUNTIME_BASE_URL: http://124.220.22.11:9002/runtime
        run: node scripts/prepare-runtime.mjs macos-x64

      - name: Verify bundled runtime
        run: |
          if ! test -f _vendor/runtime/macos-x64/node/bin/node; then
            find _vendor/runtime/macos-x64 -maxdepth 4 -print || true
            exit 1
          fi

      - name: Build Tauri app
        env:
          CARGO_BUILD_JOBS: 2
          RUSTFLAGS: "-C codegen-units=1"
        run: |
          npm run build
          npm run tauri build -- --target x86_64-apple-darwin

      - name: Find DMG
        id: find_dmg
        run: find src-tauri/target/x86_64-apple-darwin/release/bundle -name "*.dmg" -type f

      - name: Normalize artifact tag
        shell: bash
        run: |
          SAFE_TAG_NAME="${TAG_NAME//\//-}"
          echo "SAFE_TAG_NAME=$SAFE_TAG_NAME" >> "$GITHUB_ENV"

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: XingShuOpenClaw-${{ env.SAFE_TAG_NAME }}-macOS-Intel-dmg
          path: src-tauri/target/x86_64-apple-darwin/release/bundle/**/*.dmg

  # ─────────── Linux x64 ───────────────────────────────────────────
  build-linux-x64:
    name: Build (Linux x64)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install frontend dependencies
        run: npm ci --prefer-offline

      - name: Setup Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            cmake \
            clang

      - name: Rust compile cache
        continue-on-error: true
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: Linux-x64

      - name: Prepare bundled runtime
        env:
          RUNTIME_BASE_URL: http://124.220.22.11:9002/runtime
        run: node scripts/prepare-runtime.mjs linux-x64

      - name: Verify bundled runtime
        run: |
          if ! test -f _vendor/runtime/linux-x64/node/bin/node; then
            find _vendor/runtime/linux-x64 -maxdepth 4 -print || true
            exit 1
          fi

      - name: Build Tauri app
        env:
          CARGO_BUILD_JOBS: 2
          RUSTFLAGS: "-C codegen-units=1"
        run: |
          npm run build
          npm run tauri build

      - name: Normalize artifact tag
        shell: bash
        run: |
          SAFE_TAG_NAME="${TAG_NAME//\//-}"
          echo "SAFE_TAG_NAME=$SAFE_TAG_NAME" >> "$GITHUB_ENV"

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: XingShuOpenClaw-${{ env.SAFE_TAG_NAME }}-Linux-x64-appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Upload Debian package
        uses: actions/upload-artifact@v4
        with:
          name: XingShuOpenClaw-${{ env.SAFE_TAG_NAME }}-Linux-x64-deb
          path: src-tauri/target/release/bundle/deb/*.deb

  # ─────────── GitHub Release (triggered on tag push) ──────────────
  release:
    name: Create Release
    needs: [build-windows-x64, build-windows-arm64, build-linux-x64, build-macos-arm64, build-macos-intel]
    if: startsWith(github.ref, 'refs/tags/v') || (github.event.inputs.tag_name != '' && github.event.inputs.tag_name != null)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Verify release tag matches app version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          EXPECTED="v${VERSION}"
          if [ "${TAG_NAME}" != "${EXPECTED}" ]; then
            echo "Release tag ${TAG_NAME} does not match package.json version ${VERSION} (expected ${EXPECTED})" >&2
            exit 1
          fi
          node - <<'NODE'
          const fs = require('fs')
          const pkgVersion = require('./package.json').version
          const tauriVersion = require('./src-tauri/tauri.conf.json').version
          const cargoToml = fs.readFileSync('./src-tauri/Cargo.toml', 'utf8')
          const cargoVersion = cargoToml.match(/^version\s*=\s*"([^"]+)"/m)?.[1]
          const versions = { 'package.json': pkgVersion, 'src-tauri/tauri.conf.json': tauriVersion, 'src-tauri/Cargo.toml': cargoVersion }
          const mismatches = Object.entries(versions).filter(([, value]) => value !== pkgVersion)
          if (mismatches.length) {
            console.error('Version mismatch:', versions)
            process.exit(1)
          }
          NODE

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | head -30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: XingShuOpenClaw ${{ env.TAG_NAME }}
          draft: false
          prerelease: false
          files: artifacts/**/*
