# XingShuOpenClaw Release Build Workflow
# Builds all platforms automatically when pushing to main branch
# Creates GitHub Release when pushing a v* tag
name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release version (e.g.: v1.0.0)"
        required: false
        type: string
        default: ""

env:
  TAG_NAME: ${{ github.event.inputs.tag_name || github.ref_name }}

jobs:
  # ─────────── Windows x64 ────────────────────────────────────────
  build-windows-x64:
    name: Build (Windows x64)
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install frontend dependencies
        run: npm ci --prefer-offline

      - name: Setup Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Rust compile cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: Windows-x64

      - name: Build Tauri app
        run: |
          choco install mingw -y --no-progress --ignore-checksums
          npm run build
          npm run tauri build
        shell: powershell

      - name: Normalize artifact tag
        shell: bash
        run: |
          SAFE_TAG_NAME="${TAG_NAME//\//-}"
          echo "SAFE_TAG_NAME=$SAFE_TAG_NAME" >> "$GITHUB_ENV"

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: XingShuOpenClaw-${{ env.SAFE_TAG_NAME }}-Windows-x64-setup
          path: src-tauri/target/release/bundle/nsis/*.exe


  # ─────────── Windows ARM64 ───────────────────────────────────────
  build-windows-arm64:
    name: Build (Windows ARM64)
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install frontend dependencies
        run: npm ci --prefer-offline

      - name: Setup Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --target aarch64-pc-windows-msvc
          rustup default stable

      - name: Rust compile cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: Windows-ARM64

      - name: Build Tauri app (ARM64)
        env:
          CARGO_BUILD_JOBS: 2
          RUSTFLAGS: "-C codegen-units=1"
        run: |
          choco install mingw -y --no-progress --ignore-checksums
          npm run build
          npm run tauri build -- --target aarch64-pc-windows-msvc
        shell: powershell

      - name: Normalize artifact tag
        shell: bash
        run: |
          SAFE_TAG_NAME="${TAG_NAME//\//-}"
          echo "SAFE_TAG_NAME=$SAFE_TAG_NAME" >> "$GITHUB_ENV"

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: XingShuOpenClaw-${{ env.SAFE_TAG_NAME }}-Windows-ARM64-setup
          path: src-tauri/target/aarch64-pc-windows-msvc/release/bundle/nsis/*.exe


  # ─────────── macOS ARM64 ────────────────────────────────────────
  build-macos-arm64:
    name: Build (macOS ARM64)
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install frontend dependencies
        run: npm ci --prefer-offline

      - name: Setup Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --target aarch64-apple-darwin
          rustup default stable

      - name: Rust compile cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: macOS-ARM64

      - name: Disable code signing
        run: echo "CODE_SIGN_IDENTITY=-" >> $GITHUB_ENV

      - name: Build Tauri app
        env:
          CARGO_BUILD_JOBS: 2
          RUSTFLAGS: "-C codegen-units=1"
        run: |
          npm run build
          npm run tauri build -- --target aarch64-apple-darwin

      - name: Find DMG
        id: find_dmg
        run: find src-tauri/target/aarch64-apple-darwin/release/bundle -name "*.dmg" -type f

      - name: Normalize artifact tag
        shell: bash
        run: |
          SAFE_TAG_NAME="${TAG_NAME//\//-}"
          echo "SAFE_TAG_NAME=$SAFE_TAG_NAME" >> "$GITHUB_ENV"

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: XingShuOpenClaw-${{ env.SAFE_TAG_NAME }}-macOS-ARM64-dmg
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/**/*.dmg

  # ─────────── macOS Intel ────────────────────────────────────────
  build-macos-intel:
    name: Build (macOS Intel)
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install frontend dependencies
        run: npm ci --prefer-offline

      - name: Setup Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --target x86_64-apple-darwin
          rustup default stable

      - name: Rust compile cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: macOS-Intel

      - name: Disable code signing
        run: echo "CODE_SIGN_IDENTITY=-" >> $GITHUB_ENV

      - name: Build Tauri app
        env:
          CARGO_BUILD_JOBS: 2
          RUSTFLAGS: "-C codegen-units=1"
        run: |
          npm run build
          npm run tauri build -- --target x86_64-apple-darwin

      - name: Find DMG
        id: find_dmg
        run: find src-tauri/target/x86_64-apple-darwin/release/bundle -name "*.dmg" -type f

      - name: Normalize artifact tag
        shell: bash
        run: |
          SAFE_TAG_NAME="${TAG_NAME//\//-}"
          echo "SAFE_TAG_NAME=$SAFE_TAG_NAME" >> "$GITHUB_ENV"

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: XingShuOpenClaw-${{ env.SAFE_TAG_NAME }}-macOS-Intel-dmg
          path: src-tauri/target/x86_64-apple-darwin/release/bundle/**/*.dmg

  # ─────────── Linux x64 ───────────────────────────────────────────
  build-linux-x64:
    name: Build (Linux x64)
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install frontend dependencies
        run: npm ci --prefer-offline

      - name: Setup Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            cmake \
            clang

      - name: Rust compile cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: Linux-x64

      - name: Build Tauri app
        env:
          CARGO_BUILD_JOBS: 2
          RUSTFLAGS: "-C codegen-units=1"
        run: |
          npm run build
          npm run tauri build

      - name: Normalize artifact tag
        shell: bash
        run: |
          SAFE_TAG_NAME="${TAG_NAME//\//-}"
          echo "SAFE_TAG_NAME=$SAFE_TAG_NAME" >> "$GITHUB_ENV"

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: XingShuOpenClaw-${{ env.SAFE_TAG_NAME }}-Linux-x64-appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Upload Debian package
        uses: actions/upload-artifact@v4
        with:
          name: XingShuOpenClaw-${{ env.SAFE_TAG_NAME }}-Linux-x64-deb
          path: src-tauri/target/release/bundle/deb/*.deb

  # ─────────── GitHub Release (triggered on tag push) ──────────────
  release:
    name: Create Release
    needs: [build-windows-x64, build-windows-arm64, build-linux-x64, build-macos-arm64, build-macos-intel]
    if: always() && (startsWith(github.ref, 'refs/tags/v') || (github.event.inputs.tag_name != '' && github.event.inputs.tag_name != null))
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | head -30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: XingShuOpenClaw ${{ env.TAG_NAME }}
          draft: false
          prerelease: false
          files: artifacts/**/*
