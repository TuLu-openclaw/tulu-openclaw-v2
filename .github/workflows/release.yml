            echo "| EXE 瀹屾暣鍖?| [灞犳埉OpenClaw_${VERSION}_x64-setup-full.exe](${DL}/灞犳埉OpenClaw_${VERSION}_x64-setup-full.exe) | 鍚?WebView2 ~200 MB |"
            echo "| MSI 瀹夎鍣?| [灞犳埉OpenClaw_${VERSION}_x64_en-US.msi](${DL}/灞犳埉OpenClaw_${VERSION}_x64_en-US.msi) | 杞婚噺鐗?~10 MB |"
            echo "| MSI 瀹屾暣鍖?| [灞犳埉OpenClaw_${VERSION}_x64-full_en-US.msi](${DL}/灞犳埉OpenClaw_${VERSION}_x64-full_en-US.msi) | 鍚?WebView2 ~200 MB |"
            echo ""
