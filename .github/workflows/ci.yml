# XingShuOpenClaw Continuous Integration Workflow
# Full feature version: lint + test + build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  repository_dispatch:
    types: [trigger-ci]
  workflow_dispatch:

# New commits on the same branch cancel in-progress workflows
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RUST_BACKTRACE: 1
  NODE_VERSION: '22'
  CARGO_TERM_COLOR: always
  DO_NOT_SKIP_OPENCLAW_CI_SKIP: "true"

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 1: Code Quality Check (Rust format + clippy)
  # ─────────────────────────────────────────────────────────────
  lint:
    name: Code Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt --component clippy
          rustup default stable

      - name: Rust version
        run: rustc --version && cargo --version

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          cache-on-failure: true

      - name: Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Rust formatting check
        working-directory: src-tauri
        run: cargo fmt --all -- --check

      - name: Rust Clippy check
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

  # ─────────────────────────────────────────────────────────────
  # Job 2: Rust Compile Check
  # ─────────────────────────────────────────────────────────────
  rust-check:
    name: Rust Compile Check
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Linux (x64)
            os: ubuntu-latest
            runtimeTarget: linux-x64
          - name: macOS (ARM64)
            os: macos-latest
            runtimeTarget: macos-arm64
          - name: Windows (x64)
            os: windows-latest
            runtimeTarget: windows-x64
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Rust version
        run: rustc --version && cargo --version

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install runtime prepare dependencies
        run: npm install

      - name: Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Prepare bundled runtime
        env:
          RUNTIME_BASE_URL: http://221.0.81.162:9002/runtime
        run: npm run runtime:prepare -- ${{ matrix.platform.runtimeTarget }}

      - name: Rust compile check
        working-directory: src-tauri
        run: cargo check --all-targets

  # ─────────────────────────────────────────────────────────────
  # Job 3: Frontend Check + Unit Tests
  # ─────────────────────────────────────────────────────────────
  frontend:
    name: Frontend Check (${{ matrix.node-version }})
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      fail-fast: false
      matrix:
        node-version: ['22', '24']
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: TypeScript type check
        run: |
          if node -e "const fs=require('fs'); const path=require('path'); function hasTs(dir){ for (const entry of fs.readdirSync(dir,{withFileTypes:true})) { const full=path.join(dir,entry.name); if (entry.isDirectory()) { if (hasTs(full)) return true } else if (/\.tsx?$/.test(entry.name)) return true } return false } process.exit(hasTs('src') ? 0 : 1)"; then
            if [ ! -x node_modules/.bin/tsc ]; then
              echo "TypeScript source files found, but the typescript package is not installed." >&2
              exit 1
            fi
            node_modules/.bin/tsc --noEmit
          else
            echo "No TypeScript source files found; skipping tsc."
          fi

      - name: Frontend build verification
        run: npm run build

      - name: Run unit tests
        run: node --test tests/*.test.js

      - name: Upload test coverage
        if: ${{ always() && hashFiles('coverage/**') != '' }}
        uses: actions/upload-artifact@v5
        with:
          name: vitest-results-${{ matrix.node-version }}
          path: coverage/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # Job 4: Playwright E2E Tests
  # ─────────────────────────────────────────────────────────────
  e2e:
    name: E2E Tests
    runs-on: macos-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Start Tauri dev server and run E2E
        run: |
          npx concurrently --success first --kill-others -p "[{name}]" -n "DEV,PLAYWRIGHT" -c "yellow,blue" \
            "npm run dev" \
            "npx playwright test --reporter=list"
        timeout-minutes: 20

  # ─────────────────────────────────────────────────────────────
  # Job 5: Security Scan
  # ─────────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Install npm audit
        run: npm install

      - name: npm dependency security audit
        run: npm audit --audit-level=moderate

      - name: Run Trivy container image scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'src-tauri'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          limit-severities-for-sarif: true
          exit-code: '1'

      - name: Upload Trivy scan results
        if: ${{ always() && hashFiles('trivy-results.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'

  # ─────────────────────────────────────────────────────────────
  # Job 6: Tauri App Build (Multi-platform Release)
  # ─────────────────────────────────────────────────────────────
  build:
    name: Build App (${{ matrix.platform.name }})
    runs-on: ${{ matrix.platform.os }}
    needs: [lint, frontend]
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Windows (x64)
            os: windows-latest
            target: x86_64-pc-windows-msvc
          - name: macOS (ARM64)
            os: macos-latest
            target: aarch64-apple-darwin
          - name: Linux (x64)
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --target ${{ matrix.platform.target }}
          rustup default stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Install frontend dependencies
        run: npm install

      - name: Prepare bundled runtime
        run: npm run runtime:prepare -- ${{ matrix.platform.runtimeTarget }}

      - name: Frontend build
        run: npm run build

      - name: Rust compile (Release)
        working-directory: src-tauri
        run: cargo build --release --target ${{ matrix.platform.target }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: build-${{ matrix.platform.name }}
          path: |
            src-tauri/target/${{ matrix.platform.target }}/release/*.exe
            src-tauri/target/${{ matrix.platform.target }}/release/星枢OpenClaw
            src-tauri/target/${{ matrix.platform.target }}/release/bundle/
          retention-days: 5

  # ─────────────────────────────────────────────────────────────
  # Job 7: GitHub Releases Publish (triggered only on tag push)
  # ─────────────────────────────────────────────────────────────
  release:
    name: Publish Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download all build artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
