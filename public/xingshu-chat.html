<style>
:root{--bg:#070b18;--p:#0f172acc;--p2:#1e293bcc;--line:#94a3b833;--txt:#e5e7eb;--mut:#94a3b8;--pri:#818cf8;--ok:#22c55e;--bad:#ef4444;--warn:#f59e0b;--dev:#67e8f9}*{box-sizing:border-box}body{margin:0;height:100vh;overflow:hidden;background:radial-gradient(circle at 12% 8%,#6366f144,transparent 28%),radial-gradient(circle at 86% 0,#ec489922,transparent 28%),var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Microsoft YaHei',sans-serif}button,input,textarea{font:inherit}.app{height:100vh;display:grid;grid-template-rows:auto 1fr}.top{display:flex;justify-content:space-between;gap:16px;padding:16px 20px;border-bottom:1px solid var(--line);background:linear-gradient(135deg,#0f172af2,#1e293bd8)}.brand{display:flex;gap:12px;align-items:center}.logo{width:42px;height:42px;border-radius:16px;background:linear-gradient(135deg,#6366f1,#a855f7);display:grid;place-items:center;font-size:22px}h1{margin:0;font-size:22px}.sub{font-size:12px;color:var(--mut);margin-top:4px}.stats{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.stat{min-width:106px;border:1px solid var(--line);border-radius:14px;padding:8px 12px;background:#0f172aaa}.stat b{display:block;font-size:18px}.stat span{font-size:11px;color:var(--mut)}.status{border:1px solid #ef444455;background:#ef444422;color:#fecaca;border-radius:999px;padding:8px 11px;font-size:12px;font-weight:800}.status.ok{border-color:#22c55e55;background:#22c55e22;color:#bbf7d0}.layout{min-height:0;display:grid;grid-template-columns:300px minmax(420px,1fr) 330px;gap:14px;padding:14px}.card{min-height:0;border:1px solid var(--line);background:var(--p);border-radius:22px;box-shadow:0 18px 55px #02061755;overflow:hidden}.left,.right{display:flex;flex-direction:column}.profile,.panel{padding:14px;border-bottom:1px solid var(--line)}.panel:last-child{border-bottom:0}.label{font-size:12px;color:var(--mut);font-weight:800}.input,.ta{width:100%;border:1px solid var(--line);background:#02061766;color:var(--txt);border-radius:12px;padding:10px 12px;outline:none}.ta{min-height:76px;resize:vertical}.input:focus,.ta:focus{border-color:var(--pri);box-shadow:0 0 0 3px #818cf822}.btn{border:1px solid #818cf855;background:#6366f122;color:#e0e7ff;border-radius:12px;padding:9px 12px;cursor:pointer;font-weight:800}.btn:hover{background:#6366f144}.btn.p{background:linear-gradient(135deg,#6366f1,#a855f7);color:white}.btn.d{border-color:#ef444466;background:#ef444422;color:#fecaca}.btn.w{border-color:#f59e0b66;background:#f59e0b22;color:#fde68a}.btn.o{border-color:#22c55e66;background:#22c55e22;color:#bbf7d0}.btn.s{padding:6px 9px;font-size:12px}.row{display:flex;gap:8px;align-items:center}.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.title{font-size:13px;font-weight:900;margin:12px 14px 8px;color:#cbd5e1}.rooms{padding:0 10px 12px;overflow:auto}.room{width:100%;display:grid;grid-template-columns:34px 1fr auto;gap:10px;align-items:center;text-align:left;margin:7px 0;padding:10px;border:1px solid transparent;border-radius:16px;background:#1e293b77;color:var(--txt);cursor:pointer}.room.active,.room:hover{border-color:#818cf888;background:linear-gradient(135deg,#6366f144,#a855f722)}.room i{font-style:normal;font-size:22px}.room b{display:block;font-size:14px}.room small{display:block;font-size:11px;color:var(--mut)}.badge{font-size:11px;color:#c4b5fd;border:1px solid #c4b5fd44;border-radius:999px;padding:3px 7px}.main{display:grid;grid-template-rows:auto auto 1fr auto}.head{padding:16px 18px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:12px;align-items:center;background:#0f172a88}.head h2{margin:0 0 4px}.head p{margin:0;color:var(--mut);font-size:13px}.ann{margin:12px 14px 0;border:1px solid #facc153d;background:#facc1518;color:#fde68a;border-radius:14px;padding:11px 13px;line-height:1.6}.ann.empty{color:var(--mut);border-color:var(--line);background:#94a3b814}.msgs{min-height:0;overflow:auto;padding:16px;display:flex;flex-direction:column;gap:12px}.msg{display:grid;grid-template-columns:38px minmax(0,1fr) auto;gap:10px;align-items:start}.av{width:38px;height:38px;border-radius:14px;display:grid;place-items:center;background:linear-gradient(135deg,#334155,#6366f1);font-weight:900}.msg.sys .av{background:linear-gradient(135deg,#f59e0b,#ef4444)}.bubble{background:var(--p2);border:1px solid #94a3b824;border-radius:16px;padding:10px 12px}.msg.sys .bubble{background:#fbbf241c;border-color:#fbbf243d}.meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:6px}.meta b{font-size:13px}.meta span{font-size:11px;color:var(--mut)}.role{font-size:11px;border-radius:999px;padding:2px 7px;border:1px solid #c4b5fd44;color:#c4b5fd}.role.admin{color:#fcd34d;border-color:#fcd34d55}.role.developer{color:var(--dev);border-color:#67e8f955}.text{white-space:pre-wrap;word-break:break-word;line-height:1.65}.link{color:#93c5fd;text-decoration:underline;text-underline-offset:3px}.compose{border-top:1px solid var(--line);padding:12px;display:grid;grid-template-columns:1fr auto;gap:10px;background:#0f172a88}.users{display:grid;gap:7px;max-height:170px;overflow:auto}.user{display:flex;justify-content:space-between;align-items:center;border:1px solid #94a3b824;background:#1e293b77;border-radius:13px;padding:8px}.user small,.muted{color:var(--mut);font-size:13px;line-height:1.6}.mini{font-size:11px;color:var(--mut);line-height:1.5}.modal{position:fixed;inset:0;display:none;place-items:center;background:#020617aa;z-index:99}.modal.open{display:grid}.dialog{width:min(520px,92vw);border:1px solid var(--line);background:#0f172a;border-radius:22px;padding:18px;box-shadow:0 30px 90px #0008}.dialog h3{margin:0 0 12px}.empty{text-align:center;color:var(--mut);padding:48px 10px}@media(max-width:1120px){.layout{grid-template-columns:280px 1fr}.right{grid-column:1/-1;display:grid;grid-template-columns:repeat(2,1fr)}}@media(max-width:780px){body{overflow:auto}.app{height:auto}.layout{grid-template-columns:1fr}.right{display:flex}.top{flex-direction:column}.compose{grid-template-columns:1fr}.msgs{min-height:420px}}
.profile .label:nth-of-type(2){margin-top:10px}.right .panel{background:linear-gradient(180deg,#02061722,#02061700)}.main.card{border-color:#818cf844}.top:before{content:"";position:absolute;inset:0;pointer-events:none;background:linear-gradient(90deg,transparent,#818cf811,transparent)}.top{position:relative}.logo{box-shadow:0 0 32px #818cf855}.btn:disabled{opacity:.45;cursor:not-allowed}
</style>

<body>
<div class="app"><header class="top"><div class="brand"><div class="logo">💬</div><div><h1>星枢聊天室</h1><div class="sub">安全中继连接 · 独立实时聊天室 · 普通用户不可见服务器地址</div></div></div><div class="stats"><div class="stat"><b id="totalOnline">1</b><span>总在线人数</span></div><div class="stat"><b id="roomOnline">1</b><span>当前房间在线</span></div><div id="conn" class="status">本地模式</div></div></header><div class="layout"><aside class="left card"><div class="profile"><div class="label">昵称</div><input id="nick" class="input"><div class="label">连接模式</div><div class="row"><button id="connect" class="btn p" style="flex:1">连接安全聊天室</button><button id="local" class="btn">本地</button></div><div id="devServerBox" style="display:none;margin-top:8px"><div class="label">开发者连接地址</div><input id="server" class="input"></div><div class="mini">普通用户不会显示服务器 IP 和端口；失败会自动保留本地聊天室。</div></div><div class="title">房间列表</div><div id="rooms" class="rooms"></div></aside><main class="main card"><div id="head" class="head"></div><div id="ann" class="ann"></div><div id="msgs" class="msgs"></div><div class="compose"><textarea id="input" class="ta" placeholder="输入消息，Enter发送，Shift+Enter换行；网址会自动变成可点击链接"></textarea><div class="row"><input id="fileInput" type="file" style="display:none" multiple><button id="uploadBtn" class="btn" title="上传图片/文件">上传</button><button id="send" class="btn p">发送</button></div></div></main><aside class="right card"><div class="panel"><div class="title" style="margin:0 0 10px">👥 在线用户</div><div id="users" class="users"></div></div><div class="panel"><div class="title" style="margin:0 0 10px">👑 管理员权限</div><div id="admin"></div></div><div class="panel"><div class="title" style="margin:0 0 10px">🧑‍💻 开发者权限</div><div id="dev"></div></div><div class="panel"><div class="title" style="margin:0 0 10px">🛠️ 工具</div><div class="grid"><button class="btn s" data-act="exportRoom">导出房间</button><button class="btn s" data-act="exportAll">导出全部</button><button class="btn s w" data-act="clearLocal">清缓存</button><button class="btn s" data-act="debug">调试状态</button></div></div></aside></div></div><div id="modal" class="modal"><div class="dialog"><h3 id="mt"></h3><div id="mb"></div><div class="row" style="justify-content:flex-end;margin-top:14px"><button id="mc" class="btn">取消</button><button id="mo" class="btn p">确定</button></div></div></div>
<script>
const STORAGE='xingshu_chat_v4',SERVER_TOKEN='d3M6Ly8xMjQuMjIwLjIyLjExOjE4ODg4L3hpbmdzaHUtY2hhdA==',MAX_UPLOAD_MB=20;const DEFAULT_SERVER=atob(SERVER_TOKEN);
const ROOMS=[['lobby','✨','星枢大厅','默认大厅，公告与交流','公开'],['support','🛠️','售后支持','卡密、安装、启动、更新','公开'],['vip','💎','VIP贵宾室','售卖版用户专属','会员'],['ai','🤖','AI协同室','模型、Hermes、OpenClaw','公开'],['movie','🎬','影视资源室','影视源、直播源反馈','公开'],['music','🎵','音乐交流室','音乐播放器与歌单','公开'],['dev','🧑‍💻','开发者房间','二开、插件、接口','开发'],['ops','🛰️','服务器运维','服务器、网关、网络','管理'],['admin','👑','管理控制室','公告、禁言、清屏','管理员'],['audit','📋','审计日志室','权限与操作日志','开发']].map(a=>({id:a[0],icon:a[1],name:a[2],desc:a[3],level:a[4]}));
const uid=()=>crypto.randomUUID?crypto.randomUUID():'id_'+Date.now()+Math.random();const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));const fmt=s=>esc(s).replace(/(https?:\/\/[^\s<]+|www\.[^\s<]+)/gi,r=>{const href=r.startsWith('www.')?'https://'+r:r;const img=/\.(png|jpe?g|gif|webp|svg)(\?.*)?$/i.test(href);const a=`<a class="link" href="${href}" target="_blank" rel="noopener noreferrer">${r}</a>`;return img?a+`<br><img src="${href}" style="max-width:260px;max-height:180px;border-radius:12px;margin-top:8px;border:1px solid #94a3b833">`:a});const tm=()=>new Date().toLocaleTimeString('zh-CN',{hour12:false,hour:'2-digit',minute:'2-digit'});
function seed(){let m={};ROOMS.forEach(r=>m[r.id]=[]);m.lobby.push({id:uid(),system:true,user:'系统',text:'星枢聊天室已启动：安全中继连接，支持总在线/房间在线、管理员、开发者、公告、禁言、清屏、导出、链接跳转。',time:tm()});return m}
function load(){try{let s=JSON.parse(localStorage.getItem(STORAGE)||'{}');return {nick:s.nick||'星枢用户',server:s.server||DEFAULT_SERVER,room:s.room||'lobby',role:s.role||'user',messages:s.messages||seed(),announcement:s.announcement||'欢迎来到星枢聊天室。请文明交流，售后问题进入「售后支持」。',uploadEnabled:s.uploadEnabled!==false,globalMute:!!s.globalMute,roomMute:s.roomMute||{},banned:s.banned||[],users:s.users||{},roleByNick:s.roleByNick||{},fakeTotalOnline:s.fakeTotalOnline??null,fakeRoomOnline:s.fakeRoomOnline||{},log:s.log||[]}}catch{return {nick:'星枢用户',server:DEFAULT_SERVER,room:'lobby',role:'user',messages:seed(),announcement:'欢迎来到星枢聊天室。',uploadEnabled:true,globalMute:false,roomMute:{},banned:[],users:{},roleByNick:{},fakeTotalOnline:null,fakeRoomOnline:{},log:[]}}}
let S=load(),ws=null,me=localStorage.xsClientId||uid();localStorage.xsClientId=me;function save(){localStorage.setItem(STORAGE,JSON.stringify(S))}function admin(){return S.role==='admin'||S.role==='developer'}function dev(){return S.role==='developer'}function rn(){return ROOMS.find(r=>r.id===S.room)||ROOMS[0]}function log(x){S.log.unshift('['+new Date().toLocaleString()+'] '+x);S.log=S.log.slice(0,100)}function meUser(){S.users[me]={id:me,nick:S.nick,room:S.room,role:S.role,last:Date.now(),local:true}}function allUsers(){meUser();let n=Date.now();return Object.values(S.users).filter(u=>u&&n-(u.last||0)<90000)}function roomUsers(id=S.room){return allUsers().filter(u=>u.room===id)}function displayTotal(){return Number.isFinite(Number(S.fakeTotalOnline))?Number(S.fakeTotalOnline):allUsers().length}function displayRoom(id=S.room){const v=S.fakeRoomOnline?.[id];return v!==null&&v!==undefined&&v!==''&&Number.isFinite(Number(v))?Number(v):roomUsers(id).length}function wire(type,payload={}){if(ws&&ws.readyState===1)ws.send(JSON.stringify({type,clientId:me,nick:S.nick,room:S.room,role:S.role,...payload}))}function add(room,msg,b=false){let r=room||S.room;(S.messages[r]||(S.messages[r]=[])).push({id:uid(),time:tm(),...msg});S.messages[r]=S.messages[r].slice(-800);if(b)wire('message',{message:{room:r,...msg}});save();render()}function status(t,ok){let e=document.getElementById('conn');e.textContent=t;e.classList.toggle('ok',!!ok)}function role(r){return r==='developer'?'开发者':r==='admin'?'管理员':'用户'}function requestAuth(password){if(!password)return alert('请输入密码');if(!(ws&&ws.readyState===1))return alert('请先连接安全聊天室服务器，再解锁权限');wire('auth',{password});}
function renderRooms(){rooms.innerHTML=ROOMS.map(r=>`<button class="room ${r.id===S.room?'active':''}" data-room="${r.id}"><i>${r.icon}</i><span><b>${esc(r.name)}</b><small>${esc(r.desc)}</small></span><span class="badge">${displayRoom(r.id)}</span></button>`).join('');document.querySelectorAll('[data-room]').forEach(b=>b.onclick=()=>{S.room=b.dataset.room;meUser();wire('presence');save();render()})}
function renderHead(){let r=rn();head.innerHTML=`<div><h2>${r.icon} ${esc(r.name)}</h2><p>${esc(r.desc)}</p></div><div class="row"><span class="badge">${r.level}</span><span class="badge">房间在线 ${displayRoom()}</span></div>`;ann.className=S.announcement?'ann':'ann empty';ann.innerHTML=S.announcement?'📢 '+fmt(S.announcement):'📢 当前暂无公告'}
function renderMsgs(){let a=S.messages[S.room]||[];msgs.innerHTML=a.length?a.map(m=>`<div class="msg ${m.system?'sys':''}"><div class="av">${m.system?'★':esc((m.user||'?')[0])}</div><div class="bubble"><div class="meta"><b>${esc(m.user||'未知')}</b><span>${esc(m.time||'')}</span>${m.role?`<em class="role ${m.role}">${role(m.role)}</em>`:''}</div><div class="text">${fmt(m.text||'')}</div></div>${admin()?`<button class="btn s d" data-del="${m.id}">删除</button>`:''}</div>`).join(''):'<div class="empty">这个房间还没有消息。</div>';document.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>delMsg(b.dataset.del));setTimeout(()=>msgs.scrollTop=msgs.scrollHeight,0)}
function renderUsers(){let u=roomUsers();users.innerHTML=u.map(x=>`<div class="user"><div><b>${esc(x.nick)}</b><br><small>${role(x.role)} · ${x.local?'本机':'远程'}</small></div>${admin()&&!x.local?`<button class="btn s d" data-kick="${x.id}">踢</button>`:''}</div>`).join('')||'<div class="muted">暂无在线用户</div>';totalOnline.textContent=displayTotal();roomOnline.textContent=displayRoom();document.querySelectorAll('[data-kick]').forEach(b=>b.onclick=()=>wire('kick',{target:b.dataset.kick}))}
function renderAdmin(){if(!admin()){adminEl.innerHTML=`<div class="muted">输入管理员密码解锁公告、禁言、删消息、清屏、导出、踢人、取消管理员权限。</div><div class="row"><input id="ap" class="input" type="password" placeholder="管理员密码"><button id="al" class="btn p">解锁</button></div>`;al.onclick=()=>requestAuth(ap.value);return}adminEl.innerHTML=`<div class="grid"><button class="btn s" data-act="editAnn">编辑公告</button><button class="btn s d" data-act="delAnn">删除公告</button><button class="btn s w" data-act="globalMute">${S.globalMute?'解除全局禁言':'全局禁言'}</button><button class="btn s w" data-act="roomMute">${S.roomMute[S.room]?'解除房间禁言':'房间禁言'}</button><button class="btn s d" data-act="clearRoom">清空房间</button><button class="btn s" data-act="broadcast">全站广播</button><button class="btn s" data-act="banWord">违禁词</button><button class="btn s ${S.uploadEnabled?'w':'o'}" data-act="toggleUpload">${S.uploadEnabled?'关闭上传':'允许上传'}</button><button class="btn s d" data-act="dropAdmin">取消管理员</button><button class="btn s" data-act="permList">权限清单</button></div><div class="mini" style="margin-top:8px">当前权限：${role(S.role)}</div>`}
function renderDev(){if(!dev()){devEl.innerHTML=`<div class="muted">开发者权限：授予/取消管理员、模拟在线、导入导出状态、审计日志。</div><div class="row"><input id="dp" class="input" type="password" placeholder="开发者密码"><button id="dl" class="btn p">解锁</button></div>`;dl.onclick=()=>requestAuth(dp.value);return}devEl.innerHTML=`<div class="grid"><button class="btn s o" data-act="grantAdmin">指定管理员</button><button class="btn s d" data-act="revokeAdmin">取消指定</button><button class="btn s" data-act="fakeTotal">自定义总人数</button><button class="btn s" data-act="fakeRoom">自定义房间人数</button><button class="btn s" data-act="exportState">导出JSON</button><button class="btn s d" data-act="clearAudit">清审计</button></div><div class="mini" style="margin-top:8px;max-height:90px;overflow:auto">${S.log.slice(0,8).map(esc).join('<br>')||'暂无日志'}</div>`}
function render(){window.adminEl=document.getElementById('admin');window.devEl=document.getElementById('dev');nick.value=S.nick;if(typeof server!=='undefined')server.value=dev()?S.server:'';if(typeof devServerBox!=='undefined')devServerBox.style.display=dev()?'block':'none';if(typeof uploadBtn!=='undefined'){uploadBtn.disabled=!S.uploadEnabled&&!admin();uploadBtn.textContent=S.uploadEnabled||admin()?'上传':'已禁上传'}meUser();renderRooms();renderHead();renderMsgs();renderUsers();renderAdmin();renderDev();document.querySelectorAll('[data-act]').forEach(b=>b.onclick=()=>act(b.dataset.act));save()}function modal(t,h){return new Promise(res=>{mt.textContent=t;mb.innerHTML=h;modalEl.classList.add('open');mc.onclick=()=>{modalEl.classList.remove('open');res(null)};mo.onclick=()=>{let v=[...mb.querySelectorAll('input,textarea')].map(x=>x.value);modalEl.classList.remove('open');res(v)}})}const modalEl=document.getElementById('modal');
async function act(a){if(a==='editAnn'){let v=await modal('编辑公告',`<textarea class="ta">${esc(S.announcement)}</textarea>`);if(v){S.announcement=v[0].trim();wire('settings-update',{announcement:S.announcement});log('编辑公告');add('notice',{system:true,user:'公告',text:S.announcement||'公告已清空'})}}if(a==='delAnn'&&confirm('删除公告？')){S.announcement='';wire('settings-update',{announcement:''});log('删除公告');add('notice',{system:true,user:'公告',text:'管理员已删除公告'})}if(a==='globalMute'){S.globalMute=!S.globalMute;wire('settings-update',{globalMute:S.globalMute});log('切换全局禁言');add(S.room,{system:true,user:'管理',text:S.globalMute?'已开启全局禁言':'已解除全局禁言'})}if(a==='roomMute'){S.roomMute[S.room]=!S.roomMute[S.room];wire('settings-update',{roomMute:{[S.room]:S.roomMute[S.room]}});log('切换房间禁言');add(S.room,{system:true,user:'管理',text:S.roomMute[S.room]?'本房间已禁言':'本房间已解除禁言'})}if(a==='clearRoom'&&confirm('清空当前房间？')){S.messages[S.room]=[];log('清空房间 '+S.room);render()}if(a==='broadcast'){let v=await modal('全站广播','<textarea class="ta"></textarea>');if(v&&v[0]){ROOMS.forEach(r=>add(r.id,{system:true,user:'广播',text:v[0]}));log('全站广播')}}if(a==='toggleUpload'){S.uploadEnabled=!S.uploadEnabled;wire('settings-update',{uploadEnabled:S.uploadEnabled});log(S.uploadEnabled?'允许上传':'禁止上传');add(S.room,{system:true,user:'管理',text:S.uploadEnabled?'管理员已允许用户上传文件/图片':'管理员已禁止用户上传文件/图片'});render()}if(a==='banWord'){let v=await modal('违禁词','<textarea class="ta">'+esc(S.banned.join('，'))+'</textarea>');if(v){S.banned=v[0].split(/[，,\n]/).map(x=>x.trim()).filter(Boolean);log('更新违禁词');render()}}if(a==='dropAdmin'||a==='revokeAdmin'||a==='resetPerm'){S.role='user';log('取消管理员/开发者权限');add(S.room,{system:true,user:'权限',text:'已取消管理员/开发者权限'});render()}if(a==='grantAdmin'){let v=await modal('指定用户为管理员','<input class="input" placeholder="输入用户昵称">');if(v&&v[0]){S.roleByNick[v[0].trim()]='admin';wire('settings-update',{roleByNick:{[v[0].trim()]:'admin'}});log('指定管理员 '+v[0]);render()}}if(a==='fakeTotal'){let v=await modal('自定义总在线人数','<input class="input" type="number" placeholder="留空恢复真实人数">');if(v){S.fakeTotalOnline=v[0]===''?null:Number(v[0]);wire('settings-update',{fakeTotalOnline:S.fakeTotalOnline});render()}}if(a==='fakeRoom'){let v=await modal('自定义当前房间人数','<input class="input" type="number" placeholder="留空恢复真实人数">');if(v){S.fakeRoomOnline[S.room]=v[0]===''?null:Number(v[0]);wire('settings-update',{fakeRoomOnline:{[S.room]:S.fakeRoomOnline[S.room]}});render()}}if(a==='revokeAdmin'){let v=await modal('取消指定管理员','<input class="input" placeholder="输入用户昵称">');if(v&&v[0]){S.roleByNick[v[0].trim()]='user';wire('settings-update',{roleByNick:{[v[0].trim()]:'user'}});log('取消指定 '+v[0]);render()}}if(a==='permList'){alert('管理员：公告、禁言、房间禁言、清屏、广播、违禁词、上传开关、删消息、踢人、导出。\n开发者：拥有管理员全部权限，另可指定/取消用户管理员、自定义总在线人数、自定义房间人数、导出状态、查看审计。')}if(a==='simUsers'){for(let i=1;i<=8;i++)S.users['sim'+i]={id:'sim'+i,nick:'模拟用户'+i,room:ROOMS[i%ROOMS.length].id,role:i%5===0?'admin':'user',last:Date.now()};log('模拟在线人数');render()}if(a==='exportRoom')download('room-'+S.room+'.json',JSON.stringify(S.messages[S.room]||[],null,2));if(a==='exportAll'||a==='exportState')download('xingshu-chat-state.json',JSON.stringify(S,null,2));if(a==='clearLocal'&&confirm('清空本地聊天室缓存？')){localStorage.removeItem(STORAGE);location.reload()}if(a==='clearAudit'){S.log=[];render()}if(a==='debug')alert(JSON.stringify({role:S.role,total:allUsers().length,room:roomUsers().length,server:dev()?S.server:'hidden',ws:ws&&ws.readyState},null,2))}
function delMsg(id){for(const k of Object.keys(S.messages))S.messages[k]=S.messages[k].filter(m=>m.id!==id);log('删除消息 '+id);render()}function download(name,txt){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([txt],{type:'application/json'}));a.download=name;a.click();URL.revokeObjectURL(a.href)}
function send(){let text=input.value.trim();if(!text)return;if((S.globalMute||S.roomMute[S.room])&&!admin())return alert('当前已禁言');let hit=S.banned.find(w=>w&&text.includes(w));if(hit)return alert('包含违禁词：'+hit);add(S.room,{user:S.nick,role:S.role,text},true);input.value=''}function apiBase(){return (S.server||DEFAULT_SERVER).replace(/^ws/i,'http').replace(/\/xingshu-chat.*$/,'')}function fileToBase64(file){return new Promise((res,rej)=>{let r=new FileReader();r.onload=()=>res(String(r.result).split(',')[1]||'');r.onerror=rej;r.readAsDataURL(file)})}async function uploadFiles(files){if(!S.uploadEnabled&&!admin())return alert('管理员已关闭文件/图片上传');if(!files||!files.length)return;if(!S.server)S.server=DEFAULT_SERVER;for(const file of files){if(file.size>MAX_UPLOAD_MB*1024*1024){alert(file.name+' 超过 '+MAX_UPLOAD_MB+'MB 限制');continue}try{status('上传中...',true);const data=await fileToBase64(file);const resp=await fetch(apiBase()+'/upload',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({name:file.name,mime:file.type,data})});const j=await resp.json();if(!j.ok)throw new Error(j.error||'上传失败');const url=apiBase()+j.file.url;const isImg=(j.file.mime||'').startsWith('image/');const text=(isImg?'[图片] ':'[文件] ')+j.file.name+'\\n'+url+'\\n大小：'+Math.ceil(j.file.size/1024)+'KB，服务器自动清理：'+j.file.expiresInDays+'天';add(S.room,{user:S.nick,role:S.role,text},true)}catch(e){alert('上传失败：'+e.message)}finally{status(ws&&ws.readyState===1?'服务器在线':'本地模式',ws&&ws.readyState===1)}}}sendBtn=document.getElementById('send');sendBtn.onclick=send;uploadBtn.onclick=()=>{if(!S.uploadEnabled&&!admin())return alert('管理员已关闭文件/图片上传');fileInput.click()};fileInput.onchange=()=>{uploadFiles(fileInput.files);fileInput.value=''};input.onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}};nick.onchange=()=>{S.nick=nick.value.trim()||'星枢用户';render()};server.onchange=()=>{S.server=server.value.trim()||DEFAULT_SERVER;save()};local.onclick=()=>{if(ws)ws.close();ws=null;status('本地模式',false)};connect.onclick=()=>{try{if(ws)ws.close();S.server=server.value.trim()||DEFAULT_SERVER;status('连接中...',false);ws=new WebSocket(S.server);ws.onopen=()=>{status('服务器在线',true);wire('presence');add(S.room,{system:true,user:'服务器',text:'已连接星枢安全聊天室服务器'})};ws.onmessage=e=>{try{let d=JSON.parse(e.data);if(d.type==='presence'||d.type==='online'){(d.users||[]).forEach(u=>S.users[u.id||u.clientId]=u);if(d.displayTotal!==undefined)S.fakeTotalOnline=d.displayTotal;if(d.displayRoomCounts)S.fakeRoomOnline=d.displayRoomCounts;if(d.settings)Object.assign(S,d.settings);render()}else if(d.type==='settings'&&d.settings){Object.assign(S,d.settings);if(d.roleByNick)S.roleByNick=d.roleByNick;render()}else if(d.type==='message'&&d.message){add(d.message.room||S.room,{user:d.message.user||d.nick||'远程用户',role:d.message.role||'user',text:d.message.text||''})}else if(d.type==='role'){S.role=d.role||S.role;if(d.settings)Object.assign(S,d.settings);if(d.roleByNick)S.roleByNick=d.roleByNick;log('服务器确认权限：'+role(S.role));add(S.role==='developer'?'dev':'admin',{system:true,user:'权限',text:'服务器已确认：'+role(S.role)});render()}else if(d.type==='error'){alert(d.error||'服务器拒绝操作')}else if(d.type==='kick'&&d.target===me){alert('你已被管理员踢出');ws.close()}}catch{add(S.room,{user:'服务器',text:e.data})}};ws.onerror=()=>{status('握手失败/本地模式',false);add(S.room,{system:true,user:'服务器',text:'服务器握手失败，已保留本地模式。请确认聊天室服务已开放并运行。'})};ws.onclose=()=>status('本地模式',false)}catch(err){status('本地模式',false);alert('连接失败：'+err.message)}};setInterval(()=>{meUser();wire('presence');renderUsers();renderRooms()},15000);render();
</script>
