<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>音乐播放器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);min-height:100vh;color:#fff}
.container{max-width:900px;margin:0 auto;padding:20px}
h1{text-align:center;margin-bottom:20px;font-size:28px;text-shadow:0 0 20px rgba(255,255,255,0.3)}
.platform-tabs{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:15px;justify-content:center}
.platform-tabs button{padding:8px 16px;border:none;border-radius:20px;cursor:pointer;font-size:14px;transition:all 0.3s;background:rgba(255,255,255,0.1);color:#fff}
.platform-tabs button.active{background:linear-gradient(135deg,#667eea,#764ba2);box-shadow:0 4px 15px rgba(102,126,234,0.4)}
.platform-tabs button:hover{transform:translateY(-2px)}
.search-box{display:flex;gap:10px;margin-bottom:20px}
.search-box input{flex:1;padding:12px 20px;border:none;border-radius:25px;background:rgba(255,255,255,0.15);color:#fff;font-size:16px;outline:none}
.search-box input::placeholder{color:rgba(255,255,255,0.6)}
.search-box button{padding:12px 25px;border:none;border-radius:25px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;cursor:pointer;font-size:16px;transition:all 0.3s}
.search-box button:hover{transform:scale(1.05);box-shadow:0 4px 15px rgba(102,126,234,0.4)}
.song-list{background:rgba(255,255,255,0.08);border-radius:15px;overflow:hidden;backdrop-filter:blur(10px)}
.song-item{display:flex;align-items:center;padding:12px 15px;border-bottom:1px solid rgba(255,255,255,0.05);transition:background 0.3s;cursor:pointer}
.song-item:last-child{border-bottom:none}
.song-item:hover{background:rgba(255,255,255,0.1)}
.song-item.playing{background:rgba(102,126,234,0.2)}
.song-cover{width:50px;height:50px;border-radius:8px;object-fit:cover;margin-right:12px;flex-shrink:0}
.song-info{flex:1;min-width:0}
.song-name{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px}
.song-artist{font-size:12px;color:rgba(255,255,255,0.6);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.song-album{font-size:11px;color:rgba(255,255,255,0.4);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.platform-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;margin-top:4px}
.platform-badge.netease{background:rgba(235,60,50,0.8)}
.platform-badge.qq{background:rgba(40,180,220,0.8)}
.platform-badge.kugou{background:rgba(40,100,200,0.8)}
.platform-badge.kuwo{background:rgba(255,100,50,0.8)}
.platform-badge.migu{background:rgba(200,50,120,0.8)}
.song-duration{color:rgba(255,255,255,0.5);font-size:12px;margin:0 10px;flex-shrink:0}
.song-actions{display:flex;gap:8px;flex-shrink:0}
.song-actions button{width:32px;height:32px;border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all 0.3s}
.play-btn{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.play-btn:hover{transform:scale(1.1)}
.download-btn{background:rgba(255,255,255,0.15);color:#fff}
.download-btn:hover{background:rgba(255,255,255,0.3)}
.player-panel{background:rgba(0,0,0,0.3);border-radius:20px;padding:20px;margin-top:20px;backdrop-filter:blur(10px)}
.player-top{display:flex;align-items:center;gap:20px;margin-bottom:15px}
.player-cover{width:80px;height:80px;border-radius:12px;object-fit:cover;flex-shrink:0;box-shadow:0 8px 25px rgba(0,0,0,0.3)}
.player-cover.playing{animation:spin 10s linear infinite}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.player-info{flex:1;min-width:0}
.player-name{font-size:18px;font-weight:600;margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player-artist{font-size:14px;color:rgba(255,255,255,0.6)}
.progress-bar{flex:1;display:flex;align-items:center;gap:10px}
.progress-time{font-size:12px;color:rgba(255,255,255,0.5);width:45px;text-align:center}
.progress-track{flex:1;height:6px;background:rgba(255,255,255,0.2);border-radius:3px;cursor:pointer;position:relative}
.progress-fill{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:3px;width:0%;transition:width 0.1s}
.progress-bar:hover .progress-track{height:8px}
.player-controls{display:flex;justify-content:center;align-items:center;gap:20px;margin-top:15px}
.control-btn{width:45px;height:45px;border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all 0.3s;background:rgba(255,255,255,0.1);color:#fff}
.control-btn:hover{transform:scale(1.1);background:rgba(255,255,255,0.2)}
.control-btn.play-pause{width:55px;height:55px;background:linear-gradient(135deg,#667eea,#764ba2);font-size:24px}
.control-btn.play-pause:hover{box-shadow:0 4px 20px rgba(102,126,234,0.5)}
.lyrics-panel{background:rgba(255,255,255,0.05);border-radius:15px;padding:20px;margin-top:15px;max-height:200px;overflow-y:auto;text-align:center}
.lyrics-line{padding:8px 0;font-size:14px;color:rgba(255,255,255,0.5);transition:all 0.3s}
.lyrics-line.active{color:#fff;font-size:16px;font-weight:600}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(100px);background:rgba(0,0,0,0.8);color:#fff;padding:12px 25px;border-radius:25px;font-size:14px;transition:transform 0.3s;z-index:1000}
.toast.show{transform:translateX(-50%) translateY(0)}
.loading{text-align:center;padding:40px;color:rgba(255,255,255,0.6)}
.empty-tip{text-align:center;padding:40px;color:rgba(255,255,255,0.4)}
@media(max-width:600px){
.song-item{flex-wrap:wrap}
.song-duration{display:none}
.song-info{width:calc(100% - 65px)}
.player-top{flex-direction:column;text-align:center}
.player-cover{width:120px;height:120px}
.player-name{font-size:16px}
}
</style>
</head>
<body>
<div class="container">
<h1>🎵 音乐播放器</h1>
<div class="platform-tabs" id="platformTabs">
<button class="active" data-platform="all">全部</button>
<button data-platform="netease">网易云</button>
<button data-platform="qq">QQ音乐</button>
<button data-platform="kugou">酷狗</button>
<button data-platform="kuwo">酷我</button>
<button data-platform="migu">咪咕</button>
</div>
<div class="search-box">
<input type="text" id="searchInput" placeholder="搜索歌曲、歌手...">
<button id="searchBtn">搜索</button>
</div>
<div class="song-list" id="songList"></div>
<div class="player-panel" id="playerPanel" style="display:none">
<div class="player-top">
<img class="player-cover" id="playerCover" src="">
<div class="player-info">
<div class="player-name" id="playerName">未选择歌曲</div>
<div class="player-artist" id="playerArtist">-</div>
</div>
<div class="progress-bar">
<span class="progress-time" id="currentTime">0:00</span>
<div class="progress-track" id="progressTrack">
<div class="progress-fill" id="progressFill"></div>
</div>
<span class="progress-time" id="totalTime">0:00</span>
</div>
</div>
<div class="player-controls">
<button class="control-btn" id="prevBtn">⏮</button>
<button class="control-btn play-pause" id="playPauseBtn">▶</button>
<button class="control-btn" id="nextBtn">⏭</button>
<button class="control-btn" id="downloadBtn">⬇</button>
</div>
<div class="lyrics-panel" id="lyricsPanel">
<div class="lyrics-line" id="lyricsContent">歌词加载中...</div>
</div>
</div>
</div>
<div class="toast" id="toast"></div>
<script>
const defaultSongs=[
{name:"孤勇者",artist:"陈奕迅",album:"",platform:"netease",id:"1901371647",duration:"4:05",cover:"https://p2.music.126.net/Vf7xzFnZXgVFU80oYcKcvw==/109951166952713766.jpg"},
{name:"起风了",artist:"买辣椒也用券",album:"",platform:"netease",id:"1842022081",duration:"4:38",cover:"https://p2.music.126.net/Vf7xzFnZXgVFU80oYcKcvw==/109951166952713766.jpg"},
{name:"漠河舞厅",artist:"柳爽",album:"",platform:"netease",id:"1498195650",duration:"4:50",cover:"https://p1.music.126.net/pcYHpMkdC69VVvWiynNklA==/109951166952713766.jpg"},
{name:"稻香",artist:"周杰伦",album:"魔杰座",platform:"netease",id:"18600163",duration:"3:43",cover:"https://p2.music.126.net/-KDMg一批N6USx尸0l1qV-8A==/18879214683548241.jpg"},
{name:"晴天",artist:"周杰伦",album:"叶惠美",platform:"netease",id:"18600102",duration:"4:29",cover:"https://p2.music.126.net/-KDMg一批N6USx尸0l1qV-8A==/18879214683548241.jpg"},
{name:"告白气球",artist:"周杰伦",album:"周杰伦的床边故事",platform:"netease",id:"41621589",duration:"3:36",cover:"https://p1.music.126.net/AiNF3DTwVQRVcoWW6syZqA==/109951166952713766.jpg"},
{name:"七里香",artist:"周杰伦",album:"七里香",platform:"netease",id:"18600116",duration:"4:59",cover:"https://p1.music.126.net/-KDMg一批N6USx尸0l1qV-8A==/18879214683548241.jpg"},
{name:"简单爱",artist:"周杰伦",album:"范特西",platform:"netease",id:"185960",duration:"4:31",cover:"https://p1.music.126.net/-KDMg一批N6USx尸0l1qV-8A==/18879214683548241.jpg"},
{name:"夜曲",artist:"周杰伦",album:"十一月的萧邦",platform:"netease",id:"18600131",duration:"4:34",cover:"https://p1.music.126.net/-KDMg一批N6USx尸0l1qV-8A==/18879214683548241.jpg"},
{name:"青花瓷",artist:"周杰伦",album:"我很忙",platform:"netease",id:"18600135",duration:"3:59",cover:"https://p1.music.126.net/-KDMg一批N6USx尸0l1qV-8A==/18879214683548241.jpg"}
];
let currentPlatform='all';
let songs=[];
let audio=new Audio();
let currentIndex=-1;
let isPlaying=false;
function showToast(msg){
const toast=document.getElementById('toast');
toast.textContent=msg;
toast.classList.add('show');
setTimeout(()=>toast.classList.remove('show'),2000);
}
function formatTime(s){
s=Math.max(0,Math.floor(s)||0);
let m=Math.floor(s/60);
let sec=s%60;
return m+':'+(sec<10?'0':'')+sec;
}
function parseTime(str){
if(!str)return 0;
let parts=str.split(':');
if(parts.length===2)return parseInt(parts[0])*60+parseInt(parts[1]);
return 0;
}
function renderList(list){
const container=document.getElementById('songList');
if(list.length===0){
container.innerHTML='<div class="empty-tip">没有找到相关歌曲</div>';
return;
}
container.innerHTML=list.map((s,i)=>'<div class="song-item'+(currentIndex===i&&isPlaying?' playing':'')+'" data-index="'+i+'">'
+'<img class="song-cover" src="'+s.cover+'" onerror="this.src=\'https:// via.placeholder.com/50\'">'
+'<div class="song-info">'
+'<div class="song-name">'+s.name+'</div>'
+'<div class="song-artist">'+s.artist+'</div>'
+(s.album?'<div class="song-album">'+s.album+'</div>':'')
+'<span class="platform-badge '+s.platform+'">'+getPlatformName(s.platform)+'</span>'
+'</div>'
+'<span class="song-duration">'+(s.duration||'')+'</span>'
+'<div class="song-actions">'
+'<button class="play-btn" data-action="play" title="播放">▶</button>'
+'<button class="download-btn" data-action="download" title="下载">⬇</button>'
+'</div>'
+'</div>').join('');
container.querySelectorAll('.song-item').forEach(item=>{
item.addEventListener('click',e=>{
if(e.target.dataset.action==='play'){playSong(parseInt(item.dataset.index));}
else if(e.target.dataset.action==='download'){downloadSong(parseInt(item.dataset.index));}
else{playSong(parseInt(item.dataset.index));}
});
});
}
function getPlatformName(p){
const map={netease:'网易云',qq:'QQ',kugou:'酷狗',kuwo:'酷我',migu:'咪咕'};
return map[p]||p;
}
function playSong(index){
if(index<0||index>=songs.length)return;
currentIndex=index;
const song=songs[index];
audio.src=getPlayUrl(song);
audio.play().then(()=>{
isPlaying=true;
updatePlayerUI();
renderList(songs);
loadLyrics(song);
showToast('正在播放: '+song.name);
}).catch(err=>{
showToast('播放失败，请稍后重试');
console.error(err);
});
}
function getPlayUrl(song){
if(song.platform==='netease'){
return'https://music.163.com/song/media/outer/url?id='+song.id+'.mp3';
}
if(song.platform==='qq'){
return'https://api.injahow.cn/meting/?source=tencent&id='+song.id;
}
if(song.platform==='kugou'){
return'https://api.injahow.cn/meting/?source=kugou&id='+song.id;
}
if(song.platform==='kuwo'){
return'https://api.injahow.cn/meting/?source=kuwo&id='+song.id;
}
if(song.platform==='migu'){
return'https://api.injahow.cn/meting/?source=migu&id='+song.id;
}
return'https://api.injahow.cn/meting/?source=netease&id='+song.id;
}
function updatePlayerUI(){
const panel=document.getElementById('playerPanel');
if(currentIndex<0){panel.style.display='none';return;}
panel.style.display='block';
const song=songs[currentIndex];
document.getElementById('playerCover').src=song.cover;
document.getElementById('playerCover').className='player-cover'+(isPlaying?' playing':'');
document.getElementById('playerName').textContent=song.name;
document.getElementById('playerArtist').textContent=song.artist;
document.getElementById('playPauseBtn').textContent=isPlaying?'⏸':'▶';
}
function downloadSong(index){
const song=songs[index];
const url=getPlayUrl(song);
const a=document.createElement('a');
a.href=url;
a.download=song.name+'-'+song.artist+'.mp3';
a.target='_blank';
document.body.appendChild(a);
a.click();
document.body.removeChild(a);
showToast('开始下载: '+song.name);
}
async function loadLyrics(song){
const lyricsEl=document.getElementById('lyricsContent');
lyricsEl.innerHTML='歌词加载中...';
lyricsEl.className='lyrics-line';
try{
let url='';
let lyricText='';
if(song.platform==='netease'){
url='https://music.163.com/api/song/lyric?id='+song.id+'&lv=1';
const resp=await fetch(url);
const data=await resp.json();
if(data.lrc&&data.lrc.lyric){
lyricText=data.lrc.lyric;
}
}else if(song.platform==='qq'){
url='https://c.y.qq.com/lyric/fcgi-bin/fcg_query_lyric_new.fcg';
const resp=await fetch(url,{
headers:{'Referer':'https://y.qq.com','User-Agent':'Mozilla/5.0'}
});
const text=await resp.text();
const match=text.match(/"lyric"\s*:\s*"([^"]+)"/);
if(match){
lyricText=decodeBase64(match[1]);
}
}else{
lyricsEl.innerHTML='该平台暂不支持歌词';
return;
}
if(!lyricText){
lyricsEl.innerHTML='暂无歌词';
return;
}
const lines=lyricText.split('\n').filter(l=>l.trim()).map(l=>l.replace(/^\[\d{2}:\d{2}\.\d+\]/,'').trim()).filter(l=>l);
if(lines.length===0){
lyricsEl.innerHTML='暂无歌词';
return;
}
lyricsEl.innerHTML=lines.map(l=>'<div class="lyrics-line">'+l+'</div>').join('');
}catch(e){
lyricsEl.innerHTML='歌词加载失败';
}
}
function getFilteredSongs(){
if(currentPlatform==='all')return songs;
return songs.filter(s=>s.platform===currentPlatform);
}
document.getElementById('platformTabs').addEventListener('click',e=>{
if(e.target.tagName==='BUTTON'){
document.querySelectorAll('.platform-tabs button').forEach(b=>b.classList.remove('active'));
e.target.classList.add('active');
currentPlatform=e.target.dataset.platform;
renderList(getFilteredSongs());
}
});
document.getElementById('searchBtn').addEventListener('click',doSearch);
document.getElementById('searchInput').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch();});
async function doSearch(){
const query=document.getElementById('searchInput').value.trim();
if(!query){renderList(defaultSongs);songs=defaultSongs;return;}
showToast('搜索中...');
const results=[];
const ps=[];
if(currentPlatform==='all'||currentPlatform==='netease'){
ps.push(searchNetease(query));
}
if(currentPlatform==='all'||currentPlatform==='qq'){
ps.push(searchQQ(query));
}
if(currentPlatform==='all'||currentPlatform==='kugou'){
ps.push(searchKugou(query));
}
if(currentPlatform==='all'||currentPlatform==='kuwo'){
ps.push(searchKuwo(query));
}
if(currentPlatform==='all'||currentPlatform==='migu'){
ps.push(searchMigu(query));
}
const all=await Promise.allSettled(ps);
all.forEach(r=>{if(r.status==='fulfilled')results.push(...r.value);});
songs=results;
renderList(results);
if(results.length===0)showToast('未找到结果');
else showToast('找到 '+results.length+' 首歌曲');
}
async function searchNetease(query){
try{
const resp=await fetch('https://music.163.com/api/search/get?s='+encodeURIComponent(query)+'&type=1&limit=20&offset=0');
const data=await resp.json();
if(data.result&&data.result.songs){
return data.result.songs.map(s=>({
name:s.name,
artist:s.artists&&s.artists[0]?s.artists[0].name:'',
album:s.album?s.album.name:'',
platform:'netease',
id:String(s.id),
duration:s.duration?formatTime(Math.floor(s.duration/1000)):'',
cover:'https://p2.music.126.net/Vf7xzFnZXgVFU80oYcKcvw==/109951166952713766.jpg'
}));
}
}catch(e){}
return[];
}
async function searchQQ(query){
try{
const resp=await fetch('https://c.y.qq.com/soso/fcgi-bin/client_search_cp?w='+encodeURIComponent(query)+'&format=json&p=1&n=20');
const text=await resp.text();
const match=text.match(/\{.*\}/s);
if(!match)return[];
const data=JSON.parse(match[0]);
if(data.data&&data.data.song){
return data.data.song.list.map(s=>({
name:s.songname,
artist:s.singer[0]?s.singer[0].name:'',
album:s.albumname,
platform:'qq',
id:String(s.songid),
duration:s.interval?formatTime(s.interval):'',
cover:'https://y.gtimg.cn/music/photo_new/T002R300x300M000'+(s.albummid||'')+'.jpg'
}));
}
}catch(e){}
return[];
}
async function searchKugou(query){
try{
const resp=await fetch('https://songsearch.kugou.com/song_search_v2?keyword='+encodeURIComponent(query)+'&page=1&pagesize=20');
const data=await resp.json();
if(data.data&&data.data.lists){
return data.data.lists.map(s=>({
name:s.SongName,
artist:s.SingerName,
album:s.AlbumName,
platform:'kugou',
id:String(s.FileHash),
duration:s.Duration?formatTime(parseInt(s.Duration)):'',
cover:'https://www.kugou.com/yy/static/images/default.jpg'
}));
}
}catch(e){}
return[];
}
async function searchKuwo(query){
try{
const resp=await fetch('https://search.kuwo.cn/r.s?pn=0&rn=20&key='+encodeURIComponent(query)+'&ft=music&cluster=0&alg=0.3&rformat=json&encoding=utf8');
const text=await resp.text();
const match=text.match(/\{.*\}/s);
if(!match)return[];
const data=JSON.parse(match[0]);
if(data.abslist){
return data.abslist.map(s=>({
name:s.NAME,
artist:s.ARTIST,
album:s.ALBUM,
platform:'kuwo',
id:String(s.MUSICRID).replace('musicrack://',''),
duration:s.DURATION?formatTime(parseInt(s.DURATION)):'',
cover:'https://www.kuwo.cn/p.png'
}));
}
}catch(e){}
return[];
}
async function searchMigu(query){
try{
const resp=await fetch('https://m.music.migu.cn/migu/remoting/scr_search_tag?keyword='+encodeURIComponent(query)+'&page=0&pageSize=20&type=0');
const data=await resp.json();
if(data.musics){
return data.musics.map(s=>({
name:s.songName,
artist:s.singerName,
album:s.albumName,
platform:'migu',
id:String(s.copyrightId),
duration:s.duration?formatTime(parseInt(s.duration)):'',
cover:s.cover || 'https://www.migu.cn/p.png'
}));
}
}catch(e){}
return[];
}
document.getElementById('playPauseBtn').addEventListener('click',()=>{
if(currentIndex<0){
if(songs.length>0)playSong(0);
return;
}
if(isPlaying){audio.pause();isPlaying=false;}
else{audio.play().then(()=>{isPlaying=true;updatePlayerUI();renderList(songs);}).catch(()=>{});}
updatePlayerUI();
renderList(songs);
});
document.getElementById('prevBtn').addEventListener('click',()=>{
if(currentIndex>0)playSong(currentIndex-1);
else if(songs.length>0)playSong(songs.length-1);
});
document.getElementById('nextBtn').addEventListener('click',()=>{
if(currentIndex<songs.length-1)playSong(currentIndex+1);
else if(songs.length>0)playSong(0);
});
document.getElementById('downloadBtn').addEventListener('click',()=>{
if(currentIndex>=0)downloadSong(currentIndex);
});
document.getElementById('progressTrack').addEventListener('click',e=>{
if(audio.duration){
audio.currentTime=(e.offsetX/e.target.offsetWidth)*audio.duration;
}
});
audio.addEventListener('timeupdate',()=>{
if(audio.duration){
document.getElementById('progressFill').style.width=(audio.currentTime/audio.duration*100)+'%';
document.getElementById('currentTime').textContent=formatTime(audio.currentTime);
document.getElementById('totalTime').textContent=formatTime(audio.duration);
}
});
audio.addEventListener('ended',()=>{
if(currentIndex<songs.length-1)playSong(currentIndex+1);
else{isPlaying=false;updatePlayerUI();renderList(songs);}
});
audio.addEventListener('error',()=>{
showToast('播放出错，请尝试其他歌曲');
isPlaying=false;
updatePlayerUI();
renderList(songs);
});
songs=[...defaultSongs];
renderList(songs);
</script>
</body>
</html>
