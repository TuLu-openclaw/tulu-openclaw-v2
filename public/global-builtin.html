<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全球内置</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Microsoft YaHei', sans-serif; }

/* 密码遮罩 - 覆盖全屏 */
#auth-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: #0a0a0a;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 999999;
  transition: opacity 0.3s;
}
#auth-overlay.hidden {
  opacity: 0;
  pointer-events: none;
}
.auth-box {
  text-align: center;
}
.auth-input {
  width: 280px;
  padding: 14px 20px;
  font-size: 18px;
  background: #1a1a1a;
  border: 1px solid #333;
  border-radius: 8px;
  color: #fff;
  outline: none;
  text-align: center;
  letter-spacing: 4px;
  transition: border-color 0.2s;
}
.auth-input:focus {
  border-color: #555;
}
.auth-input.error {
  border-color: #e74c3c;
  animation: shake 0.3s;
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-6px); }
  75% { transform: translateX(6px); }
}

/* 内容区域 */
#content-frame {
  width: 100%;
  height: 100%;
  border: none;
  display: none;
}
</style>
</head>
<body>

<div id="auth-overlay">
  <div class="auth-box">
    <input type="password" class="auth-input" id="pwd-input" autofocus>
  </div>
</div>

<iframe id="content-frame" src="about:blank"></iframe>

<script>
(function() {
  const overlay = document.getElementById('auth-overlay');
  const input = document.getElementById('pwd-input');
  const frame = document.getElementById('content-frame');
  const TARGET = 'https://zh.stripcam.xxx/top/girls/current-month-asia-and-pacific';
  const PWD = '2552667173';

  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      if (input.value === PWD) {
        overlay.classList.add('hidden');
        frame.style.display = 'block';
        frame.src = TARGET;
        setTimeout(() => overlay.remove(), 500);
      } else {
        input.classList.add('error');
        input.value = '';
        setTimeout(() => input.classList.remove('error'), 400);
      }
    }
  });
})();
</script>
</body>
</html>
