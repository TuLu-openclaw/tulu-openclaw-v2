<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全球内置</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Inter', 'Microsoft YaHei', sans-serif; background: #000; }

/* ===== 密码验证遮罩 ===== */
#auth-overlay {
  position: fixed; inset: 0;
  background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 50%, #0a1a2e 100%);
  display: flex; align-items: center; justify-content: center;
  z-index: 999999;
  transition: opacity 0.5s ease, transform 0.5s ease;
}
#auth-overlay.hidden { opacity: 0; transform: scale(1.05); pointer-events: none; }

.auth-container {
  text-align: center; padding: 48px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 24px;
  backdrop-filter: blur(20px);
  box-shadow: 0 32px 64px rgba(0,0,0,0.5);
  animation: fadeInUp 0.6s ease;
}
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}
.auth-icon {
  width: 80px; height: 80px; margin: 0 auto 24px;
  border-radius: 50%;
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  display: flex; align-items: center; justify-content: center;
  font-size: 36px;
  box-shadow: 0 8px 32px rgba(99,102,241,0.3);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 8px 32px rgba(99,102,241,0.3); }
  50% { box-shadow: 0 8px 48px rgba(99,102,241,0.5); }
}
.auth-title {
  font-size: 22px; font-weight: 600; color: #fff; margin-bottom: 8px;
  letter-spacing: -0.02em;
}
.auth-subtitle {
  font-size: 14px; color: rgba(255,255,255,0.4); margin-bottom: 32px;
}
.input-wrapper {
  position: relative; margin-bottom: 20px;
}
.auth-input {
  width: 320px; padding: 16px 24px 16px 48px;
  font-size: 16px; font-family: 'Inter', monospace;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 14px; color: #fff; outline: none;
  letter-spacing: 3px;
  transition: all 0.3s ease;
}
.auth-input::placeholder { color: rgba(255,255,255,0.2); letter-spacing: normal; }
.auth-input:focus {
  border-color: rgba(99,102,241,0.5);
  background: rgba(255,255,255,0.08);
  box-shadow: 0 0 0 4px rgba(99,102,241,0.1);
}
.auth-input.error {
  border-color: #ef4444;
  animation: shake 0.4s ease;
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-8px); }
  40% { transform: translateX(8px); }
  60% { transform: translateX(-4px); }
  80% { transform: translateX(4px); }
}
.input-icon {
  position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
  font-size: 18px; opacity: 0.4; pointer-events: none;
}
.enter-hint {
  display: inline-block; margin-top: 16px;
  padding: 8px 20px;
  font-size: 12px; color: rgba(255,255,255,0.3);
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 8px;
  animation: fadeIn 1s ease 0.5s both;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* ===== iframe 容器 ===== */
#content-frame {
  width: 100%; height: 100%; border: none;
  display: none;
}

/* ===== 悬浮操作栏 ===== */
#float-bar {
  position: fixed; bottom: 24px; right: 24px;
  z-index: 888888; display: none;
  flex-direction: column; gap: 10px;
  align-items: flex-end;
}
.float-btn {
  width: 52px; height: 52px; border-radius: 50%;
  border: none; cursor: pointer;
  font-size: 20px; color: #fff;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s ease;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}
.float-btn:hover { transform: scale(1.12); }
.float-btn:active { transform: scale(0.95); }
.float-btn:disabled { opacity: 0.5; cursor: not-allowed; }
#btn-extract {
  background: linear-gradient(135deg, #ef4444, #dc2626);
  box-shadow: 0 4px 24px rgba(239,68,68,0.4);
}
#btn-extract:hover { box-shadow: 0 6px 32px rgba(239,68,68,0.6); }
#btn-refresh {
  background: linear-gradient(135deg, #3b82f6, #2563eb);
  box-shadow: 0 4px 24px rgba(59,130,246,0.4);
}
#btn-fullscreen {
  background: linear-gradient(135deg, #10b981, #059669);
  box-shadow: 0 4px 24px rgba(16,185,129,0.4);
}

/* ===== Toast ===== */
#toast {
  position: fixed; bottom: 96px; right: 28px;
  z-index: 888889;
  background: rgba(15,15,25,0.92);
  border: 1px solid rgba(255,255,255,0.1);
  color: #fff; padding: 14px 22px;
  border-radius: 12px; font-size: 14px;
  display: none; max-width: 360px;
  backdrop-filter: blur(12px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  word-break: break-all;
}
</style>
</head>
<body>

<!-- 密码验证遮罩 -->
<div id="auth-overlay">
  <div class="auth-container">
    <div class="auth-icon">&#x1f510;</div>
    <div class="auth-title">安全验证</div>
    <div class="auth-subtitle">请输入访问密码以继续</div>
    <div class="input-wrapper">
      <span class="input-icon">&#x1f511;</span>
      <input type="password" class="auth-input" id="pwd-input" placeholder="输入密码" autofocus>
    </div>
    <div class="enter-hint">按 Enter 确认</div>
  </div>
</div>

<!-- iframe 加载外部页面 -->
<iframe id="content-frame" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals"></iframe>

<!-- 悬浮操作栏 -->
<div id="float-bar">
  <button class="float-btn" id="btn-extract" title="提取视频链接">&#x25b6;</button>
  <button class="float-btn" id="btn-refresh" title="刷新页面">&#x21bb;</button>
  <button class="float-btn" id="btn-fullscreen" title="全屏 iframe">&#x26f6;</button>
</div>
<div id="toast"></div>

<script>
(function() {
  var overlay = document.getElementById('auth-overlay');
  var input = document.getElementById('pwd-input');
  var frame = document.getElementById('content-frame');
  var floatBar = document.getElementById('float-bar');
  var btnExtract = document.getElementById('btn-extract');
  var btnRefresh = document.getElementById('btn-refresh');
  var btnFullscreen = document.getElementById('btn-fullscreen');
  var toastEl = document.getElementById('toast');
  var TARGET = atob('{{TARGET_URL}}');
  var PWD = '2552667173';
  var verified = false;

  function showToast(msg, duration) {
    duration = duration || 4000;
    toastEl.textContent = msg;
    toastEl.style.display = 'block';
    clearTimeout(showToast._t);
    showToast._t = setTimeout(function() { toastEl.style.display = 'none'; }, duration);
  }

  function unlock() {
    overlay.classList.add('hidden');
    frame.style.display = 'block';
    frame.src = TARGET;
    floatBar.style.display = 'flex';
    verified = true;
    setTimeout(function() { overlay.remove(); }, 600);
  }

  // 密码验证
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      if (input.value === PWD) {
        unlock();
      } else {
        input.classList.add('error');
        input.value = '';
        setTimeout(function() { input.classList.remove('error'); }, 500);
      }
    }
  });

  // 提取视频链接
  btnExtract.addEventListener('click', async function() {
    btnExtract.disabled = true;
    btnExtract.textContent = '\u23f3';
    showToast('正在扫描页面提取视频链接...');
    try {
      var currentUrl = frame.contentWindow ? frame.src : TARGET;
      var sources = await window.__TAURI__.core.invoke('fetch_live_sources', { url: currentUrl });
      if (sources && sources.length > 0) {
        showToast('找到 ' + sources.length + ' 个视频源，正在打开播放器...');
        await window.__TAURI__.core.invoke('open_live_player', { sources: sources });
      } else {
        showToast('未检测到视频源，请先在页面上点击播放按钮', 6000);
      }
    } catch (err) {
      showToast('提取失败: ' + String(err), 6000);
    } finally {
      btnExtract.disabled = false;
      btnExtract.textContent = '\u25b6';
    }
  });

  // 刷新
  btnRefresh.addEventListener('click', function() {
    if (frame.src) {
      frame.src = frame.src;
      showToast('页面已刷新');
    }
  });

  // 全屏 iframe
  btnFullscreen.addEventListener('click', function() {
    if (frame.requestFullscreen) {
      frame.requestFullscreen();
    } else if (frame.webkitRequestFullscreen) {
      frame.webkitRequestFullscreen();
    }
  });
})();
</script>
</body>
</html>
