<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全球内置</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Inter', 'Microsoft YaHei', sans-serif; background: #000; }

/* ===== 密码验证遮罩 ===== */
#auth-overlay {
  position: fixed; inset: 0;
  background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 50%, #0a1a2e 100%);
  display: flex; align-items: center; justify-content: center;
  z-index: 999999;
  transition: opacity 0.5s ease, transform 0.5s ease;
}
#auth-overlay.hidden { opacity: 0; transform: scale(1.05); pointer-events: none; }

.auth-container {
  text-align: center; padding: 48px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 24px;
  backdrop-filter: blur(20px);
  box-shadow: 0 32px 64px rgba(0,0,0,0.5);
  animation: fadeInUp 0.6s ease;
}
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}
.auth-icon {
  width: 80px; height: 80px; margin: 0 auto 24px;
  border-radius: 50%;
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  display: flex; align-items: center; justify-content: center;
  font-size: 36px;
  box-shadow: 0 8px 32px rgba(99,102,241,0.3);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 8px 32px rgba(99,102,241,0.3); }
  50% { box-shadow: 0 8px 48px rgba(99,102,241,0.5); }
}
.auth-title {
  font-size: 22px; font-weight: 600; color: #fff; margin-bottom: 8px;
  letter-spacing: -0.02em;
}
.auth-subtitle {
  font-size: 14px; color: rgba(255,255,255,0.4); margin-bottom: 32px;
}
.input-wrapper {
  position: relative; margin-bottom: 20px;
}
.auth-input {
  width: 320px; padding: 16px 24px 16px 48px;
  font-size: 16px; font-family: 'Inter', monospace;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 14px; color: #fff; outline: none;
  letter-spacing: 3px;
  transition: all 0.3s ease;
}
.auth-input::placeholder { color: rgba(255,255,255,0.2); letter-spacing: normal; }
.auth-input:focus {
  border-color: rgba(99,102,241,0.5);
  background: rgba(255,255,255,0.08);
  box-shadow: 0 0 0 4px rgba(99,102,241,0.1);
}
.auth-input.error {
  border-color: #ef4444;
  animation: shake 0.4s ease;
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-8px); }
  40% { transform: translateX(8px); }
  60% { transform: translateX(-4px); }
  80% { transform: translateX(4px); }
}
.input-icon {
  position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
  font-size: 18px; opacity: 0.4; pointer-events: none;
}
.auth-hint {
  font-size: 12px; color: rgba(255,255,255,0.25);
  margin-top: 4px;
}
.enter-hint {
  display: inline-block; margin-top: 16px;
  padding: 8px 20px;
  font-size: 12px; color: rgba(255,255,255,0.3);
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 8px;
  animation: fadeIn 1s ease 0.5s both;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* ===== 全屏悬浮按钮 ===== */
#fullscreen-btn {
  position: fixed; bottom: 28px; right: 28px;
  z-index: 888888; display: none;
  width: 56px; height: 56px; border-radius: 50%;
  background: linear-gradient(135deg, #ef4444, #dc2626);
  border: none; cursor: pointer;
  box-shadow: 0 4px 24px rgba(239,68,68,0.4);
  transition: all 0.2s ease;
  font-size: 22px; color: #fff;
  align-items: center; justify-content: center;
}
#fullscreen-btn:hover { transform: scale(1.1); box-shadow: 0 6px 32px rgba(239,68,68,0.6); }
#fullscreen-btn:active { transform: scale(0.95); }
#fullscreen-btn:disabled { opacity: 0.6; cursor: not-allowed; }

/* ===== Toast 提示 ===== */
#toast {
  position: fixed; bottom: 96px; right: 28px;
  z-index: 888889;
  background: rgba(15,15,25,0.92);
  border: 1px solid rgba(255,255,255,0.1);
  color: #fff; padding: 14px 22px;
  border-radius: 12px; font-size: 14px;
  display: none; max-width: 320px;
  backdrop-filter: blur(12px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}
</style>
</head>
<body>

<!-- 密码验证遮罩 -->
<div id="auth-overlay">
  <div class="auth-container">
    <div class="auth-icon">🔐</div>
    <div class="auth-title">安全验证</div>
    <div class="auth-subtitle">请输入访问密码以继续</div>
    <div class="input-wrapper">
      <span class="input-icon">🔑</span>
      <input type="password" class="auth-input" id="pwd-input" placeholder="输入密码" autofocus>
    </div>
    <div class="enter-hint">按 Enter 确认</div>
  </div>
</div>

<!-- 全屏悬浮按钮 -->
<button id="fullscreen-btn" title="提取视频并全屏播放">▶</button>
<div id="toast"></div>

<script>
(function() {
  const overlay = document.getElementById('auth-overlay');
  const input = document.getElementById('pwd-input');
  const fullscreenBtn = document.getElementById('fullscreen-btn');
  const toast = document.getElementById('toast');
  const TARGET = 'https://zh.stripcam.xxx/top/girls/current-month-asia-and-pacific';
  const PWD = '2552667173';

  function showToast(msg, duration) {
    duration = duration || 4000;
    toast.textContent = msg;
    toast.style.display = 'block';
    clearTimeout(showToast._t);
    showToast._t = setTimeout(function() { toast.style.display = 'none'; }, duration);
  }

  // 密码验证 → 导航 webview 到目标URL
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      if (input.value === PWD) {
        overlay.classList.add('hidden');
        fullscreenBtn.style.display = 'flex';
        // 导航 webview 到目标 URL
        if (window.__TAURI__ && window.__TAURI__.core) {
          window.__TAURI__.core.invoke('navigate_global_builtin', { url: TARGET });
        } else {
          // 回退：直接跳转
          window.location.href = TARGET;
        }
        setTimeout(function() { overlay.remove(); }, 600);
      } else {
        input.classList.add('error');
        input.value = '';
        setTimeout(function() { input.classList.remove('error'); }, 500);
      }
    }
  });

  // 全屏按钮：调用 Rust 后端提取 m3u8
  fullscreenBtn.addEventListener('click', async function() {
    fullscreenBtn.disabled = true;
    fullscreenBtn.textContent = '⏳';
    showToast('正在扫描页面提取视频链接...');
    try {
      var sources = await window.__TAURI__.core.invoke('fetch_live_sources', { url: window.location.href });
      if (sources && sources.length > 0) {
        showToast('找到 ' + sources.length + ' 个视频源，正在打开播放器...');
        await window.__TAURI__.core.invoke('open_player_window', {
          url: sources[0], title: '全屏播放', resume: 0,
          allEps: '', allUrls: '', playbackCtx: '', pic: ''
        });
      } else {
        showToast('未检测到视频源，请先在页面上点击播放按钮', 6000);
      }
    } catch (err) {
      showToast('提取失败: ' + String(err), 6000);
    } finally {
      fullscreenBtn.disabled = false;
      fullscreenBtn.textContent = '▶';
    }
  });
})();
</script>
</body>
</html>
