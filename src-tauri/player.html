<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="playerTitle">Player</title>
<style>
:root{--bg:#0d0d0d;--surface:rgba(20,20,28,0.82);--accent:#317af7;--text:#e8e8f0;--text-dim:#8888a0}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:var(--bg);overflow:hidden;font-family:'HarmonyOS Sans SC','HarmonyOS Sans','Segoe UI',system-ui,-apple-system,sans-serif}
body{display:flex;flex-direction:column;user-select:none;background:#000}
#bg{position:fixed;inset:0;z-index:0;background-size:cover;background-position:center;filter:blur(28px) brightness(0.22) saturate(1.5);transition:background-image 0.6s ease}
#bg::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.78) 0%,rgba(0,0,0,0.2) 40%,rgba(0,0,0,0.5) 100%)}
.top-bar{position:absolute;left:0;right:0;top:0;z-index:10;background:linear-gradient(to bottom,rgba(0,0,0,0.78),rgba(0,0,0,0));padding:12px 18px 42px;display:flex;align-items:center;gap:12px;pointer-events:none}
#poster{width:34px;height:48px;border-radius:5px;object-fit:cover;box-shadow:0 4px 18px rgba(0,0,0,0.55);flex-shrink:0;display:none;opacity:.88}
.top-info{flex:1;min-width:0}
.top-title{color:#fff;font-size:16px;font-weight:700;line-height:1.25;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:3px;text-shadow:0 2px 10px rgba(0,0,0,.8)}
.top-sub{color:rgba(255,255,255,.68);font-size:12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.top-badge{background:rgba(49,122,247,.92);color:#fff;border-radius:999px;padding:2px 8px;font-size:11px;font-weight:600;letter-spacing:0.03em}
.ctrl-top-right{display:flex;gap:8px;align-items:center;flex-shrink:0}
.sel-group{display:flex;align-items:center;gap:8px;flex-shrink:0}
.sel-group select{background:var(--surface);color:var(--text);border:1px solid rgba(255,255,255,0.12);border-radius:6px;padding:5px 10px;font-size:13px;outline:none;cursor:pointer;backdrop-filter:blur(12px)}
.sel-group select:focus{border-color:var(--accent)}
.sel-label{color:var(--text-dim);font-size:12px;flex-shrink:0}
.video-wrap{position:absolute;inset:0;overflow:hidden;z-index:1;display:flex;align-items:center;justify-content:center;background:#000}
video{max-width:100%;max-height:100%;outline:none;display:block;width:100%;height:100%;object-fit:contain;background:#000}
.overlay-msg{position:absolute;inset:0;z-index:5;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.8);color:var(--text);gap:14px;pointer-events:none}
.overlay-msg.show{display:flex}
.spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,0.1);border-top-color:var(--accent);border-radius:50%;animation:spin 0.75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.msg-text{font-size:14px;color:var(--text-dim)}
.err-icon{font-size:44px;color:#f87171}
.err-text{color:#f87171;font-size:14px;text-align:center;max-width:340px}
.retry-btn{background:var(--accent);color:#fff;border:none;border-radius:6px;padding:8px 22px;font-size:14px;cursor:pointer;pointer-events:all}
.retry-btn:hover{background:#ff2020}
.ctrl-bar{position:absolute;left:0;right:0;bottom:0;z-index:10;background:linear-gradient(to top,rgba(0,0,0,0.92) 0%,rgba(0,0,0,0.68) 45%,transparent 100%);padding:54px 22px 16px;display:flex;flex-direction:column;gap:8px}
.seek-row{display:flex;align-items:center;gap:10px;padding:8px 0 0}
.time{color:rgba(255,255,255,0.7);font-size:12px;min-width:44px;text-align:center;font-variant-numeric:tabular-nums}
.seek-wrap{flex:1;height:20px;display:flex;align-items:center;cursor:pointer;position:relative}
.seek-track{position:absolute;left:0;right:0;height:4px;background:rgba(255,255,255,0.14);border-radius:3px}
.seek-buffer{position:absolute;left:0;height:100%;background:rgba(255,255,255,0.25);border-radius:3px;transition:width 0.4s}
.seek-fill{position:absolute;left:0;height:100%;background:var(--accent);border-radius:3px;pointer-events:none}
.seek-thumb{position:absolute;top:50%;transform:translate(-50%,-50%);width:14px;height:14px;background:#fff;border-radius:50%;box-shadow:0 0 8px rgba(0,0,0,0.5);pointer-events:none;opacity:0;transition:opacity 0.15s,transform 0.1s}
.seek-wrap:hover .seek-thumb{opacity:1}
.seek-wrap:active .seek-thumb{transform:translate(-50%,-50%) scale(1.25)}
.seek-tooltip{position:absolute;bottom:24px;transform:translateX(-50%);background:rgba(0,0,0,0.88);color:#fff;font-size:11px;padding:3px 8px;border-radius:4px;pointer-events:none;white-space:nowrap;display:none}
.seek-wrap:hover .seek-tooltip{display:block}
.btn-row{display:flex;align-items:center;justify-content:space-between}
.btn-group{display:flex;align-items:center;gap:2px}
.ctrl-btn{background:transparent;color:rgba(255,255,255,0.86);border:none;border-radius:8px;width:40px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background 0.15s,color 0.15s,transform 0.1s;font-size:15px;flex-shrink:0}
.ctrl-btn:hover{background:rgba(255,255,255,0.1);color:#fff}
.ctrl-btn:active{transform:scale(0.92)}
.ctrl-btn.active{color:var(--accent)}
.ctrl-btn.priority{color:var(--accent)}
.ctrl-btn.danger:hover{background:rgba(49,122,247,0.2);color:var(--accent)}
.divider{width:1px;height:20px;background:rgba(255,255,255,0.1);margin:0 6px}
.vol-group{display:flex;align-items:center;gap:4px}
.vol-slider-wrap{width:0;overflow:hidden;transition:width 0.2s ease}
.vol-group:hover .vol-slider-wrap{width:70px}
.vol-slider{width:70px;height:4px;background:rgba(255,255,255,0.2);border-radius:2px;position:relative;cursor:pointer}
.vol-fill{height:100%;background:rgba(255,255,255,0.8);border-radius:2px;pointer-events:none}
.popup-panel{display:none;position:absolute;bottom:calc(100% + 10px);background:var(--surface);border:1px solid rgba(255,255,255,0.1);border-radius:10px;overflow:hidden;z-index:20;backdrop-filter:blur(20px);min-width:96px;box-shadow:0 8px 32px rgba(0,0,0,0.5)}
.popup-panel.open{display:block}
.popup-panel button{display:block;width:100%;padding:9px 16px;background:none;border:none;color:var(--text);font-size:13px;text-align:left;cursor:pointer;transition:background 0.1s}
.popup-panel button:hover{background:rgba(255,255,255,0.08)}
.popup-panel button.active{color:var(--accent);font-weight:600}
#shortcuts{display:none;position:absolute;bottom:calc(100% + 10px);right:8px;background:var(--surface);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:16px 18px;min-width:230px;z-index:20;backdrop-filter:blur(20px);color:var(--text);font-size:12px;line-height:1.8;box-shadow:0 8px 32px rgba(0,0,0,0.5)}
#shortcuts.open{display:block}
#shortcuts h4{font-size:11px;color:var(--text-dim);margin-bottom:10px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase}
.shortcut-row{display:flex;justify-content:space-between;gap:18px}
.shortcut-key{background:rgba(255,255,255,0.1);border-radius:4px;padding:1px 7px;font-size:11px;color:rgba(255,255,255,0.85);font-family:Consolas,monospace}
.shortcut-desc{color:var(--text-dim)}
:fullscreen .ctrl-bar{padding-bottom:28px}
:fullscreen .top-bar{padding-top:24px}
</style>
</head>
<body>
<div id="bg"></div>
<div class="top-bar">
  <img id="poster" alt="poster">
  <div class="top-info">
    <div class="top-title" id="titleEl" data-i18n="videoTitleFallback">Video</div>
    <div class="top-sub" id="topSub"></div>
  </div>
  <div class="ctrl-top-right">
    <div class="sel-group" id="epGroup" style="display:none"><span class="sel-label" data-i18n="episodeLabel">Episode</span><select id="epSelect"><option data-i18n="loading">Loading...</option></select></div>
    <div class="sel-group" id="urlGroup" style="display:none"><span class="sel-label" data-i18n="lineLabel">Line</span><select id="urlSelect"><option data-i18n="loading">Loading...</option></select></div>
  </div>
</div>
<div class="video-wrap" id="wrap">
  <video id="vid" playsinline></video>
  <div class="overlay-msg" id="overlay">
    <div class="spinner" id="spinEl"></div>
    <div class="err-icon" id="errIcon" style="display:none">!</div>
    <div class="msg-text" id="msgEl" data-i18n="loadingActive">Loading...</div>
    <div class="err-text" id="errEl" style="display:none"></div>
    <button class="retry-btn" id="retryBtn" style="display:none" data-i18n="retry">Retry</button>
  </div>
</div>
<div class="ctrl-bar" id="ctrlBar">
  <div class="seek-row">
    <span class="time" id="curEl">0:00</span>
    <div class="seek-wrap" id="seekWrap">
      <div class="seek-track"><div class="seek-buffer" id="bufEl"></div><div class="seek-fill" id="fillEl"></div><div class="seek-thumb" id="thumbEl"></div></div>
      <div class="seek-tooltip" id="seekTip">0:00</div>
    </div>
    <span class="time" id="totEl">0:00</span>
  </div>
  <div class="btn-row">
    <div class="btn-group">
      <button class="ctrl-btn" id="prevBtn" title="Previous line (P)">&lt;</button>
      <button class="ctrl-btn" id="playBtn" title="Play/Pause (Space)" data-i18n-title="playPauseTitle">&#9654;</button>
      <button class="ctrl-btn" id="nextBtn" title="Next line (N)">&gt;</button>
      <div class="divider"></div>
      <div class="vol-group">
        <button class="ctrl-btn" id="muteBtn" title="Mute (M)" data-i18n-title="muteTitle">&#128266;</button>
        <div class="vol-slider-wrap"><div class="vol-slider" id="volSlider"><div class="vol-fill" id="volFill"></div></div></div>
      </div>
      <div class="divider"></div>
      <button class="ctrl-btn" id="speedBtn" title="Speed (S)" data-i18n-title="speedTitle">1x</button>
      <div class="popup-panel" id="speedMenu"></div>
    </div>
    <div class="btn-group">
      <button class="ctrl-btn" id="qualityBtn" title="Quality" data-i18n-title="qualityTitle">&#9881;</button>
      <div class="popup-panel" id="qualityMenu"></div>
      <div style="position:relative">
        <button class="ctrl-btn" id="shortcutsBtn" title="Shortcuts (Shift+/)" data-i18n-title="shortcutsTitle">?</button>
        <div id="shortcuts">
          <h4 data-i18n="shortcutsHeading">Shortcuts</h4>
          <div class="shortcut-row"><span class="shortcut-key">Space</span><span class="shortcut-desc" data-i18n="shortcutPlayPause">Play / Pause</span></div>
          <div class="shortcut-row"><span class="shortcut-key">← →</span><span class="shortcut-desc" data-i18n="shortcutSeek">Rewind / Forward 10s</span></div>
          <div class="shortcut-row"><span class="shortcut-key">↑ ↓</span><span class="shortcut-desc" data-i18n="shortcutVolume">Adjust volume</span></div>
          <div class="shortcut-row"><span class="shortcut-key">F</span><span class="shortcut-desc" data-i18n="shortcutFullscreen">Fullscreen</span></div>
          <div class="shortcut-row"><span class="shortcut-key">M</span><span class="shortcut-desc" data-i18n="shortcutMute">Mute</span></div>
          <div class="shortcut-row"><span class="shortcut-key">S</span><span class="shortcut-desc" data-i18n="shortcutSpeed">Speed menu</span></div>
          <div class="shortcut-row"><span class="shortcut-key">I</span><span class="shortcut-desc" data-i18n="shortcutPip">Picture in picture</span></div>
          <div class="shortcut-row"><span class="shortcut-key">P / N</span><span class="shortcut-desc" data-shortcut="pn">Previous line / Next line</span></div>
          <div class="shortcut-row"><span class="shortcut-key">X</span><span class="shortcut-desc" data-i18n="shortcutScreenshot">Screenshot</span></div>
          <div class="shortcut-row"><span class="shortcut-key">Shift + /</span><span class="shortcut-desc" data-i18n="shortcutTogglePanel">Show/hide this panel</span></div>
          <div class="shortcut-row"><span class="shortcut-key">Esc</span><span class="shortcut-desc" data-i18n="shortcutExitClose">Exit / Close</span></div>
        </div>
      </div>
      <button class="ctrl-btn" id="pipBtn" title="Picture in picture (I)" data-i18n-title="pipTitle">PiP</button>
      <button class="ctrl-btn" id="pipWinBtn" title="Pin window on top" data-i18n-title="pinWindowTitle">&#9103;</button>
      <button class="ctrl-btn" id="ssBtn" title="Screenshot (X)" data-i18n-title="screenshotTitle">&#128247;</button>
      <button class="ctrl-btn danger" id="closeBtn" title="Close" data-i18n-title="close">&#10005;</button>
    </div>
  </div>
</div>
<script>
(function(){
  var params = new URLSearchParams(location.search)
  var url = params.get('url') || ''
  var lang = params.get('lang') || 'zh-CN'
  var I18N = {
    'zh-CN': {playerTitle:'播放器',videoTitleFallback:'视频',loading:'加载中...',loadingActive:'正在加载...',retry:'重试',close:'关闭',standaloneWindowBadge:'独立窗口',episodeLabel:'选集',lineLabel:'线路',previousEpisode:'上一集',nextEpisode:'下一集',previousLine:'上一线路',nextLine:'下一线路',episodeTarget:'剧集',lineTarget:'线路',switchingTarget:'尝试切换{target}...',episodeOption:'第 {number} 集',lineOption:'线路 {number}',loadingTimeoutSwitching:'加载超时，{action}',noAvailableTarget:'播放失败：没有可用{target}',allTargetsFailed:'全部{target}均播放失败，请稍后重试或更换片源',hlsLoaderFailedSwitching:'HLS 播放组件加载失败，{action}',networkErrorSwitching:'网络错误，{action}',playbackFailedSwitching:'播放失败，{action}',nativeHlsFailedSwitching:'原生 HLS 加载失败，{action}',browserUnsupportedHlsSwitching:'浏览器不支持 HLS 播放，{action}',videoLoadFailedSwitching:'视频加载失败，{action}',autoQuality:'自动',qualityLevel:'等级 {number}',normalSpeed:'正常',playPauseTitle:'播放/暂停 (Space)',muteTitle:'静音 (M)',speedTitle:'倍速 (S)',qualityTitle:'画质',shortcutsTitle:'快捷键 (Shift+/)',shortcutsHeading:'快捷键',shortcutPlayPause:'播放 / 暂停',shortcutSeek:'快退 / 快进 10s',shortcutVolume:'音量调节',shortcutFullscreen:'全屏',shortcutMute:'静音',shortcutSpeed:'倍速菜单',shortcutPip:'画中画',shortcutScreenshot:'截图',shortcutTogglePanel:'显示/隐藏此面板',shortcutExitClose:'退出 / 关闭',pipTitle:'画中画 (I)',pinWindowTitle:'窗口置顶',screenshotTitle:'截图 (X)'},
    'zh-TW': {playerTitle:'播放器',videoTitleFallback:'影片',loading:'載入中...',loadingActive:'正在載入...',retry:'重試',close:'關閉',standaloneWindowBadge:'獨立視窗',episodeLabel:'選集',lineLabel:'線路',previousEpisode:'上一集',nextEpisode:'下一集',previousLine:'上一線路',nextLine:'下一線路',episodeTarget:'劇集',lineTarget:'線路',switchingTarget:'嘗試切換{target}...',episodeOption:'第 {number} 集',lineOption:'線路 {number}',loadingTimeoutSwitching:'載入逾時，{action}',noAvailableTarget:'播放失敗：沒有可用{target}',allTargetsFailed:'全部{target}均播放失敗，請稍後重試或更換片源',hlsLoaderFailedSwitching:'HLS 播放元件載入失敗，{action}',networkErrorSwitching:'網路錯誤，{action}',playbackFailedSwitching:'播放失敗，{action}',nativeHlsFailedSwitching:'原生 HLS 載入失敗，{action}',browserUnsupportedHlsSwitching:'瀏覽器不支援 HLS 播放，{action}',videoLoadFailedSwitching:'影片載入失敗，{action}',autoQuality:'自動',qualityLevel:'等級 {number}',normalSpeed:'正常',playPauseTitle:'播放/暫停 (Space)',muteTitle:'靜音 (M)',speedTitle:'倍速 (S)',qualityTitle:'畫質',shortcutsTitle:'快捷鍵 (Shift+/)',shortcutsHeading:'快捷鍵',shortcutPlayPause:'播放 / 暫停',shortcutSeek:'快退 / 快進 10s',shortcutVolume:'音量調節',shortcutFullscreen:'全螢幕',shortcutMute:'靜音',shortcutSpeed:'倍速選單',shortcutPip:'子母畫面',shortcutScreenshot:'截圖',shortcutTogglePanel:'顯示/隱藏此面板',shortcutExitClose:'退出 / 關閉',pipTitle:'子母畫面 (I)',pinWindowTitle:'視窗置頂',screenshotTitle:'截圖 (X)'},
    en: {playerTitle:'Player',videoTitleFallback:'Video',loading:'Loading...',loadingActive:'Loading...',retry:'Retry',close:'Close',standaloneWindowBadge:'Standalone window',episodeLabel:'Episode',lineLabel:'Line',previousEpisode:'Previous episode',nextEpisode:'Next episode',previousLine:'Previous line',nextLine:'Next line',episodeTarget:'episodes',lineTarget:'lines',switchingTarget:'Trying another {target}...',episodeOption:'Episode {number}',lineOption:'Line {number}',loadingTimeoutSwitching:'Loading timed out, {action}',noAvailableTarget:'Playback failed: no available {target}',allTargetsFailed:'All {target} failed to play. Try again later or switch sources.',hlsLoaderFailedSwitching:'Failed to load HLS player, {action}',networkErrorSwitching:'Network error, {action}',playbackFailedSwitching:'Playback failed, {action}',nativeHlsFailedSwitching:'Native HLS loading failed, {action}',browserUnsupportedHlsSwitching:'This browser does not support HLS playback, {action}',videoLoadFailedSwitching:'Video loading failed, {action}',autoQuality:'Auto',qualityLevel:'Level {number}',normalSpeed:'Normal',playPauseTitle:'Play/Pause (Space)',muteTitle:'Mute (M)',speedTitle:'Speed (S)',qualityTitle:'Quality',shortcutsTitle:'Shortcuts (Shift+/)',shortcutsHeading:'Shortcuts',shortcutPlayPause:'Play / Pause',shortcutSeek:'Rewind / Forward 10s',shortcutVolume:'Adjust volume',shortcutFullscreen:'Fullscreen',shortcutMute:'Mute',shortcutSpeed:'Speed menu',shortcutPip:'Picture in picture',shortcutScreenshot:'Screenshot',shortcutTogglePanel:'Show/hide this panel',shortcutExitClose:'Exit / Close',pipTitle:'Picture in picture (I)',pinWindowTitle:'Pin window on top',screenshotTitle:'Screenshot (X)'}
  }
  var COPY = I18N[lang] || I18N['zh-CN']
  document.documentElement.lang = lang
  function tr(key, params) {
    var text = COPY[key] || I18N['zh-CN'][key] || key
    if (params) for (var name in params) text = text.replace(new RegExp('\\{' + name + '\\}', 'g'), String(params[name]))
    return text
  }
  document.querySelectorAll('[data-i18n]').forEach(function(el){el.textContent=tr(el.getAttribute('data-i18n'))})
  document.querySelectorAll('[data-i18n-title]').forEach(function(el){el.title=tr(el.getAttribute('data-i18n-title'))})
  var title = decodeURIComponent(params.get('title') || tr('videoTitleFallback'))
  var resume = parseFloat(params.get('resume') || '0')
  var picRaw = params.get('pic') || ''
  var playbackCtx = null
  try{playbackCtx=JSON.parse(params.get('playbackCtx')||params.get('playback_ctx')||'null')}catch(e){try{playbackCtx=JSON.parse(decodeURIComponent(params.get('playbackCtx')||params.get('playback_ctx')||'null'))}catch(e){}}
  var allEps=[]
  try{var r=params.get('allEps')||params.get('all_eps');if(r)allEps=JSON.parse(r)}catch(e){try{allEps=JSON.parse(decodeURIComponent(r))}catch(e){}}
  var allUrls=[]
  try{var r=params.get('allUrls')||params.get('all_urls');if(r)allUrls=JSON.parse(r)}catch(e){try{allUrls=JSON.parse(decodeURIComponent(r))}catch(e){}}
  if(!allUrls.length&&url)allUrls=[url]
  var pic=picRaw?decodeURIComponent(picRaw):''
  var curUrlIdx=url?allUrls.indexOf(url):0
  if(curUrlIdx<0)curUrlIdx=0
  var vid=document.getElementById('vid')
  var bg=document.getElementById('bg')
  var poster=document.getElementById('poster')
  var titleEl=document.getElementById('titleEl')
  var topSub=document.getElementById('topSub')
  var epGroup=document.getElementById('epGroup')
  var epSelect=document.getElementById('epSelect')
  var urlGroup=document.getElementById('urlGroup')
  var urlSelect=document.getElementById('urlSelect')
  var playBtn=document.getElementById('playBtn')
  var prevBtn=document.getElementById('prevBtn')
  var nextBtn=document.getElementById('nextBtn')
  var muteBtn=document.getElementById('muteBtn')
  var speedBtn=document.getElementById('speedBtn')
  var qualityBtn=document.getElementById('qualityBtn')
  var qualityMenu=document.getElementById('qualityMenu')
  var shortcutsBtn=document.getElementById('shortcutsBtn')
  var shortcuts=document.getElementById('shortcuts')
  var pipBtn=document.getElementById('pipBtn')
  var pipWinBtn=document.getElementById('pipWinBtn')
  var ssBtn=document.getElementById('ssBtn')
  var closeBtn=document.getElementById('closeBtn')
  var seekWrap=document.getElementById('seekWrap')
  var fillEl=document.getElementById('fillEl')
  var bufEl=document.getElementById('bufEl')
  var thumbEl=document.getElementById('thumbEl')
  var seekTip=document.getElementById('seekTip')
  var curEl=document.getElementById('curEl')
  var totEl=document.getElementById('totEl')
  var volSlider=document.getElementById('volSlider')
  var volFill=document.getElementById('volFill')
  var speedMenu=document.getElementById('speedMenu')
  var overlay=document.getElementById('overlay')
  var spinEl=document.getElementById('spinEl')
  var errIcon=document.getElementById('errIcon')
  var msgEl=document.getElementById('msgEl')
  var errEl=document.getElementById('errEl')
  var retryBtn=document.getElementById('retryBtn')
  titleEl.textContent=title
  document.title=title
  if(pic){poster.src=pic;poster.style.display='block';bg.style.backgroundImage='url('+pic+')'}
  function getEpisodeByUrl(epUrl){
    if(!epUrl||!allEps||!allEps.length)return null
    for(var i=0;i<allEps.length;i++){
      var ep=allEps[i]
      if(ep&&ep.url===epUrl)return ep
    }
    return null
  }
  function isEpisodeUrlList(){
    if(!allUrls.length||!allEps.length)return false
    for(var i=0;i<allUrls.length;i++){if(!getEpisodeByUrl(allUrls[i]))return false}
    return true
  }
  var urlsAreEpisodes=isEpisodeUrlList()
  function navPrevText(){return urlsAreEpisodes?tr('previousEpisode'):tr('previousLine')}
  function navNextText(){return urlsAreEpisodes?tr('nextEpisode'):tr('nextLine')}
  function switchTargetText(){return urlsAreEpisodes?tr('episodeTarget'):tr('lineTarget')}
  function switchActionText(){return tr('switchingTarget',{target:switchTargetText()})}
  function syncNavCopy(){
    prevBtn.title=navPrevText()+' (P)'
    nextBtn.title=navNextText()+' (N)'
    var pn=shortcuts&&shortcuts.querySelector('[data-shortcut=pn]')
    if(pn)pn.textContent=navPrevText()+' / '+navNextText()
  }
  function syncEpisodeContext(epUrl,fallbackTitle){
    var ep=getEpisodeByUrl(epUrl)
    var nextTitle=(ep&&ep.epName)||fallbackTitle||title
    if(ep&&playbackCtx){playbackCtx.epName=ep.epName||playbackCtx.epName}
    if(ep&&ep.pic&&!poster.src){poster.src=ep.pic;poster.style.display='block';bg.style.backgroundImage='url('+ep.pic+')'}
    var eidx=ep?allEps.indexOf(ep):-1
    if(eidx>=0&&epSelect.options[eidx])epSelect.selectedIndex=eidx
    if(nextTitle&&topSub)setTopSub(nextTitle)
    return nextTitle
  }
  function setTopSub(text){
    topSub.textContent=''
    var badge=document.createElement('span')
    badge.className='top-badge'
    badge.textContent=tr('standaloneWindowBadge')
    var label=document.createElement('span')
    label.textContent=text||tr('videoTitleFallback')
    topSub.appendChild(badge)
    topSub.appendChild(label)
    if(resume>0){
      var resumeBadge=document.createElement('span')
      resumeBadge.className='top-badge'
      resumeBadge.textContent='续播 ' + fmtTime(resume)
      topSub.appendChild(resumeBadge)
    }
  }
  setTopSub(title)
  syncNavCopy()
  if(allEps.length>1){
    epGroup.style.display='flex'
    epSelect.textContent=''
    allEps.forEach(function(e,i){
      var opt=document.createElement('option')
      opt.value=String(i)
      opt.textContent=e&&e.epName?e.epName:tr('episodeOption',{number:i+1})
      if(e&&e.url===url)opt.selected=true
      epSelect.appendChild(opt)
    })
    epSelect.addEventListener('change',function(){
      var idx=parseInt(epSelect.value)
      var ep=allEps[idx]
      if(!ep)return
      playUrl(ep.url,syncEpisodeContext(ep.url,ep.epName),ep.pic||pic)
    })
  }
  if(allUrls.length>1&&!urlsAreEpisodes){
    urlGroup.style.display='flex'
    var urlLabel=urlGroup.querySelector('.sel-label')
    if(urlLabel)urlLabel.textContent=switchTargetText()
    urlSelect.textContent=''
    allUrls.forEach(function(u,i){
      var opt=document.createElement('option')
      opt.value=String(i)
      var ep=getEpisodeByUrl(u)
      opt.textContent=urlsAreEpisodes?(ep&&ep.epName?ep.epName:tr('episodeOption',{number:i+1})):tr('lineOption',{number:i+1})
      if(i===curUrlIdx)opt.selected=true
      urlSelect.appendChild(opt)
    })
    urlSelect.addEventListener('change',function(){
      var nextUrl=allUrls[parseInt(urlSelect.value)]
      playUrl(nextUrl,syncEpisodeContext(nextUrl,title))
    })
  }
  var hls=null
  var wantResume=resume
  var resumeTarget=resume
  var resumeApplied=false
  var resumeSeekTimer=null
  function clearResumeSeekTimer(){if(resumeSeekTimer){clearInterval(resumeSeekTimer);resumeSeekTimer=null}}
  function applyResume(force){
    if(resumeApplied||!(resumeTarget>0)||!isFinite(resumeTarget))return false
    if(!force&&(!vid.duration||isNaN(vid.duration)))return false
    try{
      var target=vid.duration&&isFinite(vid.duration)?Math.min(resumeTarget,Math.max(0,vid.duration-1)):resumeTarget
      if(!(target>0))return false
      vid.currentTime=target
      if(Math.abs((vid.currentTime||0)-target)<1.5){resumeApplied=true;wantResume=0;clearResumeSeekTimer();return true}
    }catch(e){return false}
    return false
  }
  function armResumeSeek(){
    if(!(resumeTarget>0))return
    clearResumeSeekTimer()
    vid.addEventListener('loadedmetadata',function(){applyResume(true)},{once:true})
    vid.addEventListener('durationchange',function(){applyResume(true)},{once:true})
    vid.addEventListener('canplay',function(){applyResume(true)},{once:true})
    vid.addEventListener('playing',function(){applyResume(true)},{once:true})
    var tries=0
    resumeSeekTimer=setInterval(function(){tries++; if(applyResume(true)||tries>=32)clearResumeSeekTimer()},250)
    setTimeout(function(){applyResume(true)},80)
  }
  var retryCount=0
  var activeUrl=''
  var lastEndedSent=false
  var cleanupDone=false
  var failedUrls={}
  var loadTimer=null
  function clearLoadTimer(){if(loadTimer){clearTimeout(loadTimer);loadTimer=null}}
  function scheduleLoadTimeout(curIdx){
    clearLoadTimer()
    loadTimer=setTimeout(function(){
      showOverlay(tr('loadingTimeoutSwitching',{action:switchActionText()}),true)
      tryNextUrl(curIdx)
    },20000)
  }
  function currentUrlIndex(){var idx=allUrls.indexOf(activeUrl||vid._lastUrl||url);return idx}
  function getReportUrl(){return activeUrl||vid.currentSrc||vid.src||vid._lastUrl||url}
  function markPlaybackStarted(){lastEndedSent=false;cleanupDone=false}
  function showOverlay(msg,isErr){
    spinEl.style.display=isErr?'none':'block'
    errIcon.style.display=isErr?'block':'none'
    msgEl.style.display=isErr?'none':'block'
    msgEl.textContent=msg
    errEl.style.display=isErr?'block':'none'
    errEl.textContent=msg
    retryBtn.style.display=(isErr&&retryCount<2)?'block':'none'
    overlay.classList.add('show')
  }
  function showFinalError(msg){
    retryBtn.style.display='block'
    showOverlay(msg,true)
    retryBtn.style.display='block'
  }
  function hideOverlay(){clearLoadTimer();overlay.classList.remove('show')}
  retryBtn.addEventListener('click',function(){retryCount++;playUrl(vid._lastUrl||url,title,pic,true)})
  function fmtTime(s){
    if(!s||isNaN(s))return'0:00'
    var h=Math.floor(s/3600)
    var m=Math.floor((s%3600)/60)
    var sec=Math.floor(s%60)
    return h>0?h+':'+(m<10?'0':'')+m+':'+(sec<10?'0':'')+sec:m+':'+(sec<10?'0':'')+sec
  }
  async function playUrl(newUrl,newTitle,newPic,isRetry,keepFailures){
    if(!newUrl)return
    activeUrl=newUrl
    vid._lastUrl=newUrl
    var effectiveTitle=syncEpisodeContext(newUrl,newTitle)
    if(!isRetry)retryCount=0
    if(!keepFailures)failedUrls={}
    markPlaybackStarted()
    resumeTarget=wantResume>0?wantResume:resumeTarget
    resumeApplied=!(resumeTarget>0)
    clearResumeSeekTimer()
    showOverlay(tr('loadingActive'))
    if(hls){hls.destroy();hls=null}
    vid.src=''
    if(effectiveTitle){titleEl.textContent=effectiveTitle;document.title=effectiveTitle}
    if(newPic){poster.src=newPic;poster.style.display='block';bg.style.backgroundImage='url('+newPic+')'}
    var uidx=allUrls.indexOf(newUrl)
    if(uidx>=0&&urlSelect.options[uidx])urlSelect.selectedIndex=uidx
    var isM3u8New=newUrl.indexOf('.m3u8')!==-1
    if(isM3u8New){
      try{
        await ensureHlsJs()
      }catch(e){
        showOverlay(tr('hlsLoaderFailedSwitching',{action:switchActionText()}),true)
        tryNextUrl(uidx)
        return
      }
      scheduleLoadTimeout(uidx)
      if(window.Hls&&window.Hls.isSupported()){
        hls=new window.Hls({enableWorker:true,lowLatencyMode:false,startPosition:resumeTarget>0?resumeTarget:-1})
        hls.loadSource(newUrl)
        hls.attachMedia(vid)
        if(resumeTarget>0){try{hls.startLoad(resumeTarget)}catch(e){}}
        hls.on(window.Hls.Events.MANIFEST_PARSED,function(){
          hideOverlay();buildQualityMenu(hls)
          armResumeSeek()
          applyResume(true)
          vid.play().catch(function(){setTimeout(function(){applyResume(true)},300)})
        })
        hls.on(window.Hls.Events.ERROR,function(evt,data){
          if(data.fatal){
            if(data.type===window.Hls.ErrorTypes.NETWORK_ERROR){
              showOverlay(tr('networkErrorSwitching',{action:switchActionText()}),true)
              tryNextUrl(uidx)
            }else if(data.type===window.Hls.ErrorTypes.MEDIA_ERROR){
              hls.recoverMediaError()
            }else{
              showOverlay(tr('playbackFailedSwitching',{action:switchActionText()}),true)
              tryNextUrl(uidx)
            }
          }
        })
      }else if(vid.canPlayType('application/vnd.apple.mpegurl')){
        vid.src=newUrl
        vid.load()
        vid.addEventListener('loadedmetadata',function(){
          hideOverlay()
          armResumeSeek()
          applyResume(true)
          vid.play().catch(function(){setTimeout(function(){applyResume(true)},300)})
        },{once:true})
        vid.addEventListener('error',function(){
          showOverlay(tr('nativeHlsFailedSwitching',{action:switchActionText()}),true)
          tryNextUrl(uidx)
        },{once:true})
      }else{
        showOverlay(tr('browserUnsupportedHlsSwitching',{action:switchActionText()}),true)
        tryNextUrl(uidx)
      }
    }else{
      scheduleLoadTimeout(uidx)
      vid.src=newUrl
      vid.load()
      vid.addEventListener('loadedmetadata',function(){
        hideOverlay()
        armResumeSeek()
        applyResume(true)
        vid.play().catch(function(){setTimeout(function(){applyResume(true)},300)})
      },{once:true})
      vid.addEventListener('error',function(){
        showOverlay(tr('videoLoadFailedSwitching',{action:switchActionText()}),true)
        tryNextUrl(uidx)
      },{once:true})
    }
  }
  function tryNextUrl(curIdx){
    clearLoadTimer()
    if(!allUrls.length){showFinalError(tr('noAvailableTarget',{target:switchTargetText()}));return}
    if(curIdx>=0&&allUrls[curIdx])failedUrls[allUrls[curIdx]]=true
    var start=curIdx>=0?curIdx:0
    for(var step=1;step<=allUrls.length;step++){
      var next=(start+step)%allUrls.length
      if(allUrls[next]&&!failedUrls[allUrls[next]]){
        setTimeout(function(nextUrl){playUrl(nextUrl,syncEpisodeContext(nextUrl,title),pic,false,true)},1800,allUrls[next])
        return
      }
    }
    showFinalError(tr('allTargetsFailed',{target:switchTargetText()}))
  }
  async function ensureHlsJs(){
    if(window.Hls)return
    await new Promise(function(res,rej){
      var s=document.createElement('script')
      s.src='https://cdn.jsdelivr.net/npm/hls.js@latest'
      s.onload=res;s.onerror=rej
      document.head.appendChild(s)
    })
  }
  function buildQualityMenu(hlsInstance){
    qualityMenu.innerHTML=''
    var levels=hlsInstance.levels||[]
    if(levels.length<=1){qualityBtn.style.display='';return}
    qualityBtn.style.display=''
    var autoItem=document.createElement('button')
    autoItem.textContent=tr('autoQuality')
    autoItem.className='active'
    autoItem.addEventListener('click',function(){hlsInstance.currentLevel=-1;setActive(qualityMenu,autoItem);qualityMenu.classList.remove('open')})
    qualityMenu.appendChild(autoItem)
    levels.forEach(function(lv,i){
      var btn=document.createElement('button')
      btn.textContent=lv.height?(lv.height+'p'):tr('qualityLevel',{number:i+1})
      if(i===hlsInstance.currentLevel)btn.classList.add('active')
      btn.addEventListener('click',function(){hlsInstance.currentLevel=i;setActive(qualityMenu,btn);qualityMenu.classList.remove('open')})
      qualityMenu.appendChild(btn)
    })
  }
  function setActive(menu,activeBtn){
    var btns=menu.querySelectorAll('button')
    for(var i=0;i<btns.length;i++)btns[i].classList.remove('active')
    activeBtn.classList.add('active')
  }
  qualityBtn.addEventListener('click',function(e){e.stopPropagation();qualityMenu.classList.toggle('open');shortcuts.classList.remove('open')})
  document.addEventListener('click',function(){qualityMenu.classList.remove('open');shortcuts.classList.remove('open')})
  var speeds=[0.5,0.75,1,1.25,1.5,2,3]
  var speedIdx=2
  speeds.forEach(function(s,i){
    var b=document.createElement('button')
    b.textContent=s===1?tr('normalSpeed'):s+'x'
    if(i===speedIdx)b.classList.add('active')
    b.addEventListener('click',function(){
      speedIdx=i;vid.playbackRate=s
      speedBtn.textContent=s===1?'1x':s+'x'
      speedBtn.classList.toggle('priority',s!==1)
      setActive(speedMenu,b);speedMenu.classList.remove('open')
    })
    speedMenu.appendChild(b)
  })
  speedBtn.addEventListener('click',function(e){e.stopPropagation();speedMenu.classList.toggle('open');shortcuts.classList.remove('open')})
  document.addEventListener('click',function(){speedMenu.classList.remove('open')})
  playBtn.addEventListener('click',function(){vid.paused?vid.play().catch(function(){}):vid.pause()})
  prevBtn.addEventListener('click',function(){var idx=currentUrlIndex();if(idx>0){var nextUrl=allUrls[idx-1];playUrl(nextUrl,syncEpisodeContext(nextUrl,title),pic)}})
  nextBtn.addEventListener('click',function(){var idx=currentUrlIndex();if(idx>=0&&idx<allUrls.length-1){var nextUrl=allUrls[idx+1];playUrl(nextUrl,syncEpisodeContext(nextUrl,title),pic)}})
  muteBtn.addEventListener('click',function(){vid.muted=!vid.muted;muteBtn.innerHTML=vid.muted||vid.volume===0?'&#128263;':'&#128266;'})
  vid.addEventListener('volumechange',function(){volFill.style.width=(vid.volume*100)+'%';muteBtn.innerHTML=vid.muted||vid.volume===0?'&#128263;':'&#128266;'})
  volSlider.addEventListener('click',function(e){var r=volSlider.getBoundingClientRect();vid.volume=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width));vid.muted=false})
  vid.addEventListener('wheel',function(e){e.preventDefault();vid.volume=Math.max(0,Math.min(1,vid.volume+(e.deltaY<0?0.05:-0.05)))},{passive:false})
  vid.volume=0.8;volFill.style.width='80%'
  seekWrap.addEventListener('click',function(e){if(!vid.duration)return;var r=seekWrap.getBoundingClientRect();vid.currentTime=(e.clientX-r.left)/r.width*vid.duration})
  seekWrap.addEventListener('mousemove',function(e){
    if(!vid.duration)return
    var r=seekWrap.getBoundingClientRect()
    var pct=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width))
    seekTip.textContent=fmtTime(pct*vid.duration)
    seekTip.style.left=(pct*100)+'%'
  })
  function updateBuffer(){if(!vid.buffered.length||!vid.duration)return;var end=vid.buffered.end(vid.buffered.length-1);bufEl.style.width=Math.round((end/vid.duration)*100)+'%'}
  vid.addEventListener('progress',updateBuffer)
  vid.addEventListener('timeupdate',function(){
    if(!vid.duration)return
    var pct=(vid.currentTime/vid.duration)*100
    fillEl.style.width=pct+'%'
    thumbEl.style.left=pct+'%'
    curEl.textContent=fmtTime(vid.currentTime)
    totEl.textContent=fmtTime(vid.duration)
    reportProgress(vid.currentTime,vid.duration)
  })
  vid.addEventListener('loadedmetadata',function(){totEl.textContent=fmtTime(vid.duration)})
  vid.addEventListener('play',function(){playBtn.innerHTML='&#9208;';playBtn.classList.add('active')})
  vid.addEventListener('pause',function(){playBtn.innerHTML='&#9654;';playBtn.classList.remove('active')})
  vid.addEventListener('ended',function(){playBtn.innerHTML='&#9654;';playBtn.classList.remove('active');reportEnded()})
  function reportProgress(ct,dur){var reportUrl=getReportUrl();if(window.__TAURI__&&window.__TAURI__.event){window.__TAURI__.event.emit('player-event',{type:'playerProgress',url:reportUrl,title:titleEl.textContent,currentTime:ct,duration:dur,playbackCtx:playbackCtx}).catch(function(){})}else if(window.opener&&!window.opener.closed){window.opener.postMessage({type:'playerProgress',url:reportUrl,title:titleEl.textContent,currentTime:ct,duration:dur,playbackCtx:playbackCtx},'*')}}
  function reportEnded(){if(lastEndedSent)return;lastEndedSent=true;var reportUrl=getReportUrl();if(window.__TAURI__&&window.__TAURI__.event){window.__TAURI__.event.emit('player-event',{type:'playerEnded',url:reportUrl,title:titleEl.textContent,duration:vid.duration||0,playbackCtx:playbackCtx}).catch(function(){})}else if(window.opener&&!window.opener.closed){window.opener.postMessage({type:'playerEnded',url:reportUrl,title:titleEl.textContent,duration:vid.duration||0,playbackCtx:playbackCtx},'*')}}
  shortcutsBtn.addEventListener('click',function(e){e.stopPropagation();shortcuts.classList.toggle('open')})
  shortcuts.addEventListener('click',function(e){e.stopPropagation()})
  pipBtn.addEventListener('click',function(){try{if(document.pictureInPictureElement)document.exitPictureInPicture();else if(vid.requestPictureInPicture)vid.requestPictureInPicture()}catch(e){}})
  var winMode=false
  pipWinBtn.addEventListener('click',function(){
    winMode=!winMode
    pipWinBtn.classList.toggle('active',winMode)
    try{if(window.__TAURI__&&window.__TAURI__.window){window.__TAURI__.window.getCurrentWindow().setAlwaysOnTop(winMode).catch(function(){})}}catch(e){}
  })
  ssBtn.addEventListener('click',function(){
    try{
      var c=document.createElement('canvas')
      c.width=vid.videoWidth;c.height=vid.videoHeight
      c.getContext('2d').drawImage(vid,0,0)
      var link=document.createElement('a')
      link.download=title+'_'+fmtTime(vid.currentTime).replace(/:/g,'-')+'.png'
      link.href=c.toDataURL('image/png')
      link.click()
    }catch(e){}
  })
  closeBtn.addEventListener('click',function(){try{cleanupAndClose()}catch(e){window.close()}})
  // ── 清理函数（统一入口）──
  function doCleanup() {
    if(cleanupDone)return
    cleanupDone=true
    clearResumeSeekTimer()
    try { vid.pause() } catch(e) {}
    try { if(hls){ hls.destroy(); hls=null } } catch(e) {}
    try {
      var ct = vid.currentTime || 0, dur = vid.duration || 0, reportUrl=getReportUrl()
      if (window.__TAURI__&&window.__TAURI__.event) {
        if (dur > 0) window.__TAURI__.event.emit('player-event',{type:'playerProgress',url:reportUrl,title:titleEl.textContent,currentTime:ct,duration:dur,playbackCtx:playbackCtx}).catch(function(){})
      } else if (window.opener && !window.opener.closed) {
        if (dur > 0) window.opener.postMessage({type:'playerProgress',url:reportUrl,title:titleEl.textContent,currentTime:ct,duration:dur,playbackCtx:playbackCtx},'*')
      }
    } catch(e) {}
  }

  function cleanupAndClose() {
    doCleanup()
    window.close()
  }
  window.addEventListener('beforeunload',function(){ doCleanup() })
  window.addEventListener('pagehide',function(){ doCleanup() })
  vid.addEventListener('dblclick',function(){try{if(document.fullscreenElement)document.exitFullscreen();else vid.requestFullscreen().catch(function(){})}catch(e){}})
  document.addEventListener('keydown',function(e){
    if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT')return
    switch(e.key){
      case' ':e.preventDefault();vid.paused?vid.play().catch(function(){}):vid.pause();break
      case'ArrowLeft':e.preventDefault();vid.currentTime=Math.max(0,vid.currentTime-10);break
      case'ArrowRight':e.preventDefault();vid.currentTime=Math.min(vid.duration||0,vid.currentTime+10);break
      case'ArrowUp':e.preventDefault();vid.volume=Math.min(1,vid.volume+0.05);break
      case'ArrowDown':e.preventDefault();vid.volume=Math.max(0,vid.volume-0.05);break
      case'f':case'F':try{vid.requestFullscreen().catch(function(){})}catch(e){};break
      case'm':case'M':vid.muted=!vid.muted;break
      case'i':case'I':try{if(document.pictureInPictureElement)document.exitPictureInPicture();else vid.requestPictureInPicture()}catch(e){};break
      case'p':case'P':var idx=currentUrlIndex();if(idx>0){var nextUrl=allUrls[idx-1];playUrl(nextUrl,syncEpisodeContext(nextUrl,title),pic)};break
      case'n':case'N':var idx=currentUrlIndex();if(idx>=0&&idx<allUrls.length-1){var nextUrl=allUrls[idx+1];playUrl(nextUrl,syncEpisodeContext(nextUrl,title),pic)};break
      case's':case'S':speedMenu.classList.toggle('open');shortcuts.classList.remove('open');break
      case'?':
      case'/':
        if(e.shiftKey)shortcuts.classList.toggle('open');
        break
      case'x':case'X':try{var c=document.createElement('canvas');c.width=vid.videoWidth;c.height=vid.videoHeight;c.getContext('2d').drawImage(vid,0,0);var link=document.createElement('a');link.download=title+'_'+fmtTime(vid.currentTime).replace(/:/g,'-')+'.png';link.href=c.toDataURL('image/png');link.click()}catch(e){};break
      case'Escape':try{if(document.fullscreenElement)document.exitFullscreen();else if(shortcuts.classList.contains('open'))shortcuts.classList.remove('open');else cleanupAndClose()}catch(e){};break
    }
  })
  if(url)playUrl(url,title,pic)
})()
</script>
