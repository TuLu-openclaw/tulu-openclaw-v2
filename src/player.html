<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>播放器</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    body { display: flex; align-items: center; justify-content: center; }
    .video-wrap { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
    video { max-width: 100%; max-height: 100%; outline: none; }
    .error-msg { color: #fff; text-align: center; padding: 20px; }
    .error-msg a { color: #4a9eff; }
  </style>
</head>
<body>
  <div class="video-wrap" id="wrap"></div>
  <script>
    // 从 URL 参数获取视频信息
    const params = new URLSearchParams(location.search)
    const url = params.get('url') || ''
    const title = params.get('title') || '视频'
    const resume = parseFloat(params.get('resume') || '0')
    const isM3u8 = url.includes('.m3u8')
    
    const wrap = document.getElementById('wrap')
    
    function reportProgress(currentTime, duration) {
      if (window.opener && !window.opener.closed) {
        window.opener.postMessage({
          type: 'playerProgress',
          url: url,
          title: title,
          currentTime: currentTime,
          duration: duration
        }, '*')
      }
    }
    
    function reportEnded() {
      if (window.opener && !window.opener.closed) {
        window.opener.postMessage({
          type: 'playerEnded',
          url: url,
          title: title
        }, '*')
      }
    }
    
    if (!url) {
      wrap.innerHTML = '<div class="error-msg">无效的视频链接</div>'
    } else if (isM3u8) {
      // 加载 HLS.js
      const hlsScript = document.createElement('script')
      hlsScript.src = 'https://cdn.jsdelivr.net/npm/hls.js@latest'
      hlsScript.onload = () => {
        if (window.Hls.isSupported()) {
          const video = document.createElement('video')
          video.controls = true
          video.style.maxWidth = '100%'
          video.style.maxHeight = '100%'
          wrap.appendChild(video)
          
          const hls = new window.Hls()
          hls.loadSource(url)
          hls.attachMedia(video)
          
          hls.on(window.Hls.Events.MANIFEST_PARSED, () => {
            if (resume > 0) video.currentTime = resume
            video.play().catch(() => {})
          })
          
          video.addEventListener('timeupdate', () => {
            if (video.duration > 0) {
              reportProgress(video.currentTime, video.duration)
            }
          })
          video.addEventListener('ended', () => reportEnded())
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
          const video = document.createElement('video')
          video.controls = true
          video.src = url
          wrap.appendChild(video)
          if (resume > 0) video.currentTime = resume
          video.play().catch(() => {})
          video.addEventListener('timeupdate', () => reportProgress(video.currentTime, video.duration))
          video.addEventListener('ended', () => reportEnded())
        } else {
          wrap.innerHTML = '<div class="error-msg">您的浏览器不支持 HLS 播放<br><a href="' + url + '" target="_blank">点击下载视频</a></div>'
        }
      }
      hlsScript.onerror = () => {
        wrap.innerHTML = '<div class="error-msg">HLS.js 加载失败</div>'
      }
      document.head.appendChild(hlsScript)
    } else {
      // 直接视频
      const video = document.createElement('video')
      video.controls = true
      video.src = url
      video.style.maxWidth = '100%'
      video.style.maxHeight = '100%'
      wrap.appendChild(video)
      
      if (resume > 0) video.currentTime = resume
      video.play().catch(() => {})
      
      video.addEventListener('timeupdate', () => reportProgress(video.currentTime, video.duration))
      video.addEventListener('ended', () => reportEnded())
    }
    
    // ESC 关闭
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') window.close()
    })
  </script>
</body>
</html>
